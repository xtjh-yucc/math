<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 記帳轉換站</title>
  <!-- 引入 Tailwind CSS 進行切版與樣式設定 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 簡單的淡入動畫 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-indigo-100">

  <!-- 導覽列 -->
  <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center space-x-2 text-indigo-600">
        <i data-lucide="file-spreadsheet" class="w-7 h-7"></i>
        <h1 class="text-xl font-bold tracking-wide">AI 記帳轉換站</h1>
      </div>
      
      <div class="flex items-center space-x-4">
        <!-- 通知訊息 -->
        <div id="notificationArea" class="hidden items-center space-x-2 text-sm font-medium text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full animate-fade-in">
          <i data-lucide="check-circle-2" class="w-4 h-4"></i>
          <span id="notificationText"></span>
        </div>
        
        <!-- 設定按鈕 -->
        <button id="btnSettings" class="p-2 rounded-lg transition-colors text-slate-500 hover:bg-slate-100 hover:text-slate-700" title="設定連線">
          <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <!-- 左側：輸入區 -->
    <section class="lg:col-span-4 flex flex-col space-y-4">
      
      <!-- 設定區塊 (預設隱藏) -->
      <div id="settingsSection" class="hidden bg-indigo-50 rounded-2xl border border-indigo-100 p-5 animate-fade-in">
        <h3 class="text-sm font-semibold text-indigo-900 mb-2">連接 Google 試算表</h3>
        <p class="text-xs text-indigo-700 mb-3 leading-relaxed">
          請貼上您部署好的 Google Apps Script (Web App) 網址，這樣就能一鍵自動寫入資料喔！
        </p>
        <input
          type="url"
          id="gasUrlInput"
          class="w-full text-sm p-2.5 bg-white border border-indigo-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
          placeholder="https://script.google.com/macros/s/.../exec"
          value="https://script.google.com/macros/s/AKfycbzdLHGIpm3Y5tTmvFL3MtaITRiFZaNdDi7jAIxU3SIeh4FeZUYDv7OktX8B7bCBee4/exec"
        />
      </div>

      <!-- 文字輸入區塊 -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
        <div class="flex justify-between items-end mb-3">
          <h2 class="text-lg font-semibold text-slate-700">輸入記帳內容</h2>
          <button id="btnSample" class="text-xs text-indigo-500 hover:text-indigo-700 font-medium transition-colors">
            帶入範例
          </button>
        </div>
        
        <textarea
          id="inputText"
          class="w-full h-40 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-none transition-all"
          placeholder="請輸入您的花費... (支援多筆一起輸入)&#10;例如：今天午餐吃麵100元，剛剛搭捷運30元..."
        ></textarea>
        
        <button
          id="btnParse"
          class="w-full mt-4 flex items-center justify-center space-x-2 py-3 px-4 rounded-xl font-medium text-white transition-all bg-indigo-600 hover:bg-indigo-700 shadow-md hover:shadow-lg active:scale-[0.98]"
        >
          <i id="parseIcon" data-lucide="send" class="w-5 h-5"></i>
          <span id="parseText">開始解析並轉換</span>
        </button>
      </div>
      
      <!-- 手機版顯示的通知 -->
      <div id="mobileNotificationArea" class="hidden sm:hidden items-center space-x-2 text-sm font-medium text-emerald-600 bg-emerald-50 px-4 py-3 rounded-xl border border-emerald-100">
        <i data-lucide="check-circle-2" class="w-4 h-4"></i>
        <span id="mobileNotificationText"></span>
      </div>
    </section>

    <!-- 右側：表格結果區 -->
    <section class="lg:col-span-8 flex flex-col space-y-4">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 flex flex-col h-full">
        
        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-4 gap-4">
          <h2 class="text-lg font-semibold text-slate-700 flex items-center space-x-2">
            <span>解析結果</span>
            <span id="recordCount" class="text-xs font-normal px-2 py-0.5 bg-slate-100 text-slate-500 rounded-full">共 0 筆</span>
          </h2>
          
          <div class="flex space-x-2">
            <button id="btnDownload" disabled class="hidden sm:flex flex-1 sm:flex-none items-center justify-center space-x-1.5 px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors text-sm font-medium">
              <i data-lucide="download" class="w-4 h-4"></i>
              <span>下載 CSV</span>
            </button>
            <button id="btnCopy" disabled class="flex-1 sm:flex-none flex items-center justify-center space-x-1.5 px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed transition-colors text-sm font-medium">
              <i data-lucide="copy" class="w-4 h-4"></i>
              <span>複製</span>
            </button>
            <button id="btnSync" disabled class="flex-[2] sm:flex-none flex items-center justify-center space-x-1.5 px-4 py-2 text-white bg-emerald-400 rounded-lg shadow-sm transition-all text-sm font-medium disabled:cursor-not-allowed">
              <i id="syncIcon" data-lucide="cloud-upload" class="w-4 h-4"></i>
              <span id="syncText">一鍵寫入試算表</span>
            </button>
          </div>
        </div>

        <!-- 表格容器 -->
        <div class="flex-1 overflow-x-auto border border-slate-200 rounded-xl relative min-h-[300px]">
          
          <!-- 空白狀態 -->
          <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-8 text-center bg-slate-50/50">
            <i data-lucide="file-spreadsheet" class="w-12 h-12 mb-3 opacity-20"></i>
            <p>尚未有資料</p>
            <p class="text-sm mt-1">在左側輸入文字並按下解析，資料會自動填入此處</p>
          </div>

          <!-- 資料表格 -->
          <table id="dataTable" class="hidden w-full text-sm text-left">
            <thead class="text-xs text-slate-600 uppercase bg-slate-100 sticky top-0">
              <tr>
                <th class="px-4 py-3 whitespace-nowrap">日期</th>
                <th class="px-4 py-3 whitespace-nowrap">收支</th>
                <th class="px-4 py-3 whitespace-nowrap">類別</th>
                <th class="px-4 py-3 whitespace-nowrap">項目</th>
                <th class="px-4 py-3 whitespace-nowrap text-right">金額</th>
                <th class="px-4 py-3 min-w-[120px]">備註</th>
                <th class="px-4 py-3 text-center">操作</th>
              </tr>
            </thead>
            <tbody id="tableBody" class="divide-y divide-slate-200">
              <!-- 動態生成內容 -->
            </tbody>
          </table>
        </div>
        
        <p id="tableHint" class="hidden text-xs text-slate-500 mt-3 flex items-center">
          <span class="inline-block w-2 h-2 bg-indigo-400 rounded-full mr-2"></span>
          小提示：點擊右上角的齒輪圖示 ⚙️ 設定您的 GAS 網址，就可以直接「一鍵寫入試算表」囉！
        </p>

      </div>
    </section>

  </main>

  <script>
    // 初始化 Lucide 圖示
    lucide.createIcons();

    // === 全域變數與狀態 ===
    const apiKey = ""; // 執行環境提供的 API Key
    let tableData = [];
    let notificationTimeout;

    // 取得今天日期
    const today = new Date().toLocaleDateString('zh-TW', {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    });

    // === DOM 元素選取 ===
    const dom = {
      inputText: document.getElementById('inputText'),
      btnParse: document.getElementById('btnParse'),
      parseIcon: document.getElementById('parseIcon'),
      parseText: document.getElementById('parseText'),
      btnSample: document.getElementById('btnSample'),
      
      btnSettings: document.getElementById('btnSettings'),
      settingsSection: document.getElementById('settingsSection'),
      gasUrlInput: document.getElementById('gasUrlInput'),
      
      notificationArea: document.getElementById('notificationArea'),
      notificationText: document.getElementById('notificationText'),
      mobileNotificationArea: document.getElementById('mobileNotificationArea'),
      mobileNotificationText: document.getElementById('mobileNotificationText'),
      
      recordCount: document.getElementById('recordCount'),
      btnDownload: document.getElementById('btnDownload'),
      btnCopy: document.getElementById('btnCopy'),
      btnSync: document.getElementById('btnSync'),
      syncIcon: document.getElementById('syncIcon'),
      syncText: document.getElementById('syncText'),
      
      emptyState: document.getElementById('emptyState'),
      dataTable: document.getElementById('dataTable'),
      tableBody: document.getElementById('tableBody'),
      tableHint: document.getElementById('tableHint')
    };

    // === 初始化設定 ===
    // 預設的 GAS 網址
    const defaultGasUrl = "https://script.google.com/macros/s/AKfycbzdLHGIpm3Y5tTmvFL3MtaITRiFZaNdDi7jAIxU3SIeh4FeZUYDv7OktX8B7bCBee4/exec";
    
    // 從 LocalStorage 載入先前儲存的 GAS 網址
    const savedGasUrl = localStorage.getItem('ai_accounting_gas_url');
    if (savedGasUrl) {
      dom.gasUrlInput.value = savedGasUrl;
    } else {
      dom.gasUrlInput.value = defaultGasUrl; // 如果沒有存過，就使用預設網址
    }

    // 監聽 GAS 網址變更並自動儲存
    dom.gasUrlInput.addEventListener('input', (e) => {
      localStorage.setItem('ai_accounting_gas_url', e.target.value.trim());
    });

    // === 畫面互動功能 ===
    function showNotification(msg) {
      clearTimeout(notificationTimeout);
      dom.notificationText.textContent = msg;
      dom.mobileNotificationText.textContent = msg;
      
      dom.notificationArea.classList.remove('hidden');
      dom.notificationArea.classList.add('flex');
      dom.mobileNotificationArea.classList.remove('hidden');
      dom.mobileNotificationArea.classList.add('flex');
      
      notificationTimeout = setTimeout(() => {
        dom.notificationArea.classList.add('hidden');
        dom.notificationArea.classList.remove('flex');
        dom.mobileNotificationArea.classList.add('hidden');
        dom.mobileNotificationArea.classList.remove('flex');
      }, 3000);
    }

    dom.btnSettings.addEventListener('click', () => {
      dom.settingsSection.classList.toggle('hidden');
      if (!dom.settingsSection.classList.contains('hidden')) {
        dom.btnSettings.classList.add('bg-slate-100', 'text-slate-800');
        dom.btnSettings.classList.remove('text-slate-500');
      } else {
        dom.btnSettings.classList.remove('bg-slate-100', 'text-slate-800');
        dom.btnSettings.classList.add('text-slate-500');
      }
    });

    dom.btnSample.addEventListener('click', () => {
      dom.inputText.value = "昨天晚上去夜市吃晚餐花了150，今天早上搭計程車200元，中午吃便當100元，另外昨天還繳了電話費599。";
      updateParseButtonState();
    });

    dom.inputText.addEventListener('input', updateParseButtonState);

    function updateParseButtonState() {
      if (dom.inputText.value.trim() === '') {
        dom.btnParse.classList.replace('bg-indigo-600', 'bg-slate-300');
        dom.btnParse.classList.replace('hover:bg-indigo-700', 'cursor-not-allowed');
      } else {
        dom.btnParse.classList.replace('bg-slate-300', 'bg-indigo-600');
        dom.btnParse.classList.replace('cursor-not-allowed', 'hover:bg-indigo-700');
      }
    }

    // === 表格渲染邏輯 ===
    function renderTable() {
      dom.recordCount.textContent = `共 ${tableData.length} 筆`;
      
      if (tableData.length === 0) {
        dom.emptyState.classList.remove('hidden');
        dom.dataTable.classList.add('hidden');
        dom.tableHint.classList.add('hidden');
        
        dom.btnDownload.disabled = true;
        dom.btnCopy.disabled = true;
        dom.btnSync.disabled = true;
        
        dom.btnSync.classList.replace('bg-emerald-600', 'bg-emerald-400');
        dom.btnSync.classList.replace('hover:bg-emerald-700', 'cursor-not-allowed');
      } else {
        dom.emptyState.classList.add('hidden');
        dom.dataTable.classList.remove('hidden');
        dom.tableHint.classList.remove('hidden');
        
        dom.btnDownload.disabled = false;
        dom.btnCopy.disabled = false;
        dom.btnSync.disabled = false;
        
        dom.btnSync.classList.replace('bg-emerald-400', 'bg-emerald-600');
        dom.btnSync.classList.replace('cursor-not-allowed', 'hover:bg-emerald-700');
        
        // 產生 HTML
        dom.tableBody.innerHTML = tableData.map((row, index) => `
          <tr class="bg-white hover:bg-slate-50 transition-colors">
            <td class="px-4 py-3 whitespace-nowrap">${row.date || ''}</td>
            <td class="px-4 py-3 whitespace-nowrap">
              <span class="px-2 py-1 rounded-md text-xs font-medium ${row.type === '收入' ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">
                ${row.type || '支出'}
              </span>
            </td>
            <td class="px-4 py-3 whitespace-nowrap">${row.category || ''}</td>
            <td class="px-4 py-3 whitespace-nowrap font-medium text-slate-800">${row.item || ''}</td>
            <td class="px-4 py-3 whitespace-nowrap text-right font-medium text-slate-800">${row.amount || 0}</td>
            <td class="px-4 py-3 text-slate-500 truncate max-w-[150px]" title="${row.note || ''}">${row.note || '-'}</td>
            <td class="px-4 py-3 whitespace-nowrap text-center">
              <button onclick="deleteRow(${index})" class="text-slate-400 hover:text-rose-500 transition-colors p-1" title="刪除此筆">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </td>
          </tr>
        `).join('');
        
        // 重新初始化新產生的圖示
        lucide.createIcons();
      }
    }

    // 全域函數供 inline onclick 使用
    window.deleteRow = function(index) {
      tableData.splice(index, 1);
      renderTable();
    };

    // === API 相關邏輯 ===
    const fetchWithRetry = async (url, options, retries = 5) => {
      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return await response.json();
        } catch (error) {
          if (i === retries - 1) throw error;
          await new Promise(res => setTimeout(res, delays[i]));
        }
      }
    };

    // 1. AI 解析
    dom.btnParse.addEventListener('click', async () => {
      const text = dom.inputText.value.trim();
      if (!text) {
        showNotification('請先輸入記帳內容喔！');
        return;
      }

      // UI 讀取狀態
      dom.btnParse.disabled = true;
      dom.parseIcon.setAttribute('data-lucide', 'refresh-cw');
      dom.parseIcon.classList.add('animate-spin');
      dom.parseText.textContent = 'AI 解析中...';
      lucide.createIcons();

      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const payload = {
          contents: [{ parts: [{ text: text }] }],
          systemInstruction: {
            parts: [{ 
              text: `你是一個專業的記帳助理。請將使用者的對話輸入解析為記帳資料。
              欄位必須包含：日期、收支、類別、項目、金額、備註。
              - 今天的日期是：${today}。若使用者未指定日期，請預設使用此日期。
              - 金額必須是純數字。
              - 收支僅能是 '支出' 或 '收入'。` 
            }]
          },
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "ARRAY",
              items: {
                type: "OBJECT",
                properties: {
                  date: { type: "STRING" },
                  type: { type: "STRING" },
                  category: { type: "STRING" },
                  item: { type: "STRING" },
                  amount: { type: "NUMBER" },
                  note: { type: "STRING" }
                },
                required: ["date", "type", "category", "item", "amount", "note"]
              }
            }
          }
        };

        const result = await fetchWithRetry(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const jsonText = result.candidates?.[0]?.content?.parts?.[0]?.text;
        if (jsonText) {
          const parsedData = JSON.parse(jsonText);
          tableData = [...parsedData, ...tableData]; // 放最前面
          dom.inputText.value = '';
          updateParseButtonState();
          renderTable();
          showNotification('解析成功！已加入表格。');
        } else {
          throw new Error('無法解析回應');
        }

      } catch (error) {
        console.error("Parsing error:", error);
        showNotification('解析失敗，請稍後再試。');
      } finally {
        dom.btnParse.disabled = false;
        dom.parseIcon.setAttribute('data-lucide', 'send');
        dom.parseIcon.classList.remove('animate-spin');
        dom.parseText.textContent = '開始解析並轉換';
        lucide.createIcons();
      }
    });

    // 2. 匯出 CSV
    dom.btnDownload.addEventListener('click', () => {
      if (tableData.length === 0) return;
      const headers = ['日期', '收支', '類別', '項目', '金額', '備註'];
      const rows = tableData.map(row => 
        [row.date, row.type, row.category, row.item, row.amount, row.note || ''].join(',')
      );
      const csvContent = [headers.join(','), ...rows].join('\n');
      
      const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `記帳匯出_${today.replace(/\//g, '')}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    });

    // 3. 複製 TSV
    dom.btnCopy.addEventListener('click', () => {
      if (tableData.length === 0) return;
      const rows = tableData.map(row => 
        [row.date, row.type, row.category, row.item, row.amount, row.note || ''].join('\t')
      );
      const tsvContent = rows.join('\n');

      const textarea = document.createElement('textarea');
      textarea.value = tsvContent;
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        showNotification('已複製到剪貼簿！請直接到試算表按 Ctrl+V 貼上。');
      } catch (err) {
        showNotification('複製失敗，您的瀏覽器可能不支援。');
      } finally {
        document.body.removeChild(textarea);
      }
    });

    // 4. 同步至 GAS 試算表
    dom.btnSync.addEventListener('click', async () => {
      if (tableData.length === 0) return;
      const url = dom.gasUrlInput.value.trim();
      
      if (!url) {
        showNotification('請先在設定中輸入 Google Apps Script 網址喔！');
        dom.settingsSection.classList.remove('hidden');
        dom.btnSettings.classList.add('bg-slate-100', 'text-slate-800');
        return;
      }

      // UI 狀態更新
      dom.btnSync.disabled = true;
      dom.syncIcon.setAttribute('data-lucide', 'refresh-cw');
      dom.syncIcon.classList.add('animate-spin');
      dom.syncText.textContent = '寫入中...';
      lucide.createIcons();

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(tableData)
        });

        const result = await response.json();

        if (result.status === 'success') {
          showNotification(`太棒了！成功將 ${result.count} 筆資料寫入試算表！`);
          tableData = []; // 清空資料
          renderTable();
        } else {
          throw new Error(result.message || '寫入失敗');
        }
      } catch (error) {
        console.error("Sync error:", error);
        showNotification('寫入失敗，請檢查 GAS 網址是否正確。');
      } finally {
        // 恢復 UI 狀態
        dom.btnSync.disabled = false;
        dom.syncIcon.setAttribute('data-lucide', 'cloud-upload');
        dom.syncIcon.classList.remove('animate-spin');
        dom.syncText.textContent = '一鍵寫入試算表';
        lucide.createIcons();
      }
    });

  </script>
</body>
</html>
