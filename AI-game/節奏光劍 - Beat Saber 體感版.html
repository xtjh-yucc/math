<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>節奏光劍 - AI 體感版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    
    <style>
        body {
            background-color: #09090b; /* 極深色背景 */
            color: white;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei';
            touch-action: none;
        }
        .game-container {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 1.5rem;
            background: #000000;
            box-shadow: 0 0 60px rgba(139, 92, 246, 0.3), inset 0 0 30px rgba(255, 255, 255, 0.05);
            position: relative;
            aspect-ratio: 4/3;
            overflow: hidden;
            border: 2px solid #2e1065;
        }
        
        #input_video { display: none; }
        #output_canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 霓虹字體發光特效 */
        .neon-text-pink {
            text-shadow: 0 0 10px #ec4899, 0 0 20px #ec4899, 0 0 40px #ec4899;
            color: #fdf2f8;
        }
        .neon-text-cyan {
            text-shadow: 0 0 10px #06b6d4, 0 0 20px #06b6d4, 0 0 40px #06b6d4;
            color: #ecfeff;
        }

        /* 數字跳動特效 */
        .score-bump { animation: bump 0.2s ease-out; }
        @keyframes bump {
            0% { transform: scale(1); }
            50% { transform: scale(1.6); text-shadow: 0 0 20px #facc15; color: #facc15; }
            100% { transform: scale(1); }
        }

        /* UI 捲軸 */
        .leaderboard-scroll { max-height: 200px; overflow-y: auto; }
        .leaderboard-scroll::-webkit-scrollbar { width: 4px; }
        .leaderboard-scroll::-webkit-scrollbar-thumb { background: #8b5cf6; border-radius: 10px; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100; transition: all 0.3s ease; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 bg-slate-950">

    <!-- 訊息提示 -->
    <div id="toast" class="hidden bg-purple-600 text-white px-6 py-2 rounded-full shadow-[0_0_20px_rgba(147,51,234,0.5)] z-[100] flex items-center gap-3 border border-purple-400">
        <span id="toastMsg">訊息內容</span>
    </div>

    <!-- 頂部資訊 (HUD) -->
    <div class="w-full max-w-2xl flex justify-between items-end mb-4 px-2">
        <div class="text-left">
            <h1 class="text-3xl font-black tracking-tighter italic">
                <span class="neon-text-pink">BEAT</span> <span class="neon-text-cyan">SABER</span>
            </h1>
            <p class="text-xs text-purple-300 mt-1 uppercase tracking-widest">AI Motion Challenge</p>
        </div>
        <div class="flex gap-6">
            <div class="text-center">
                <p class="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Combo</p>
                <p id="comboDisplay" class="text-2xl font-mono font-black text-slate-400">0</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Time</p>
                <p id="timerDisplay" class="text-4xl font-mono font-black text-white leading-none">45</p>
            </div>
        </div>
    </div>

    <!-- 遊戲主畫面 -->
    <div class="game-container">
        <video id="input_video" playsinline muted></video>
        <canvas id="output_canvas" width="640" height="480"></canvas>

        <!-- 覆蓋層 (選單 / 結算 / 排行榜) -->
        <div id="overlay" class="absolute inset-0 bg-black/80 z-50 rounded-xl flex flex-col items-center justify-center p-8 backdrop-blur-md transition-all duration-300">
            
            <!-- 初始化攝影機 -->
            <div id="setupScreen" class="space-y-6 w-full max-w-sm text-center">
                <div class="text-7xl mb-2 animate-pulse">🌌</div>
                <h2 class="text-2xl font-bold text-purple-300 tracking-widest">準備連接時空引擎</h2>
                <button onclick="requestCamera()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-black py-4 rounded-2xl text-xl shadow-[0_0_30px_rgba(147,51,234,0.6)] active:scale-95 transition-all tracking-widest">
                    允許攝影機權限
                </button>
            </div>

            <!-- 開始畫面 -->
            <div id="startScreen" class="hidden space-y-6 w-full max-w-sm text-center">
                <div class="bg-slate-900/80 border border-purple-500/30 p-5 rounded-2xl text-left mb-4 shadow-inner">
                    <p class="text-sm text-purple-400 font-bold mb-3 uppercase tracking-widest border-b border-purple-500/30 pb-2">⚔️ 戰鬥指南：</p>
                    <ul class="text-xs text-slate-300 space-y-2 list-none pl-1">
                        <li class="flex items-center"><span class="w-4 h-4 bg-cyan-500 rounded flex items-center justify-center text-black font-bold mr-2 text-[10px]">1</span> 舉起雙手化作光劍 (支援單/雙手)</li>
                        <li class="flex items-center"><span class="w-4 h-4 bg-pink-500 rounded flex items-center justify-center text-white font-bold mr-2 text-[10px]">2</span> 依照方塊上的 <b class="text-white mx-1">箭頭方向</b> 快速揮砍</li>
                        <li class="flex items-center"><span class="w-4 h-4 bg-yellow-500 rounded flex items-center justify-center text-black font-bold mr-2 text-[10px]">3</span> 方向錯誤或沒砍中將中斷 Combo</li>
                    </ul>
                </div>
                
                <button onclick="startGame()" class="w-full bg-gradient-to-r from-pink-600 to-cyan-600 hover:from-pink-500 hover:to-cyan-500 text-white font-black py-4 rounded-2xl text-2xl shadow-[0_0_30px_rgba(236,72,153,0.5)] active:scale-95 transition-all tracking-widest italic">
                    LINK START
                </button>
            </div>

            <!-- 結算畫面 -->
            <div id="resultScreen" class="hidden space-y-5 w-full max-w-sm text-center">
                <h2 class="text-5xl font-black text-white tracking-widest italic neon-text-pink">STAGE CLEAR</h2>
                
                <div class="bg-slate-900/80 p-6 rounded-2xl border border-white/10 shadow-inner flex justify-between items-center">
                    <div class="text-left">
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mb-1">Total Score</p>
                        <p class="text-5xl font-black text-cyan-400" id="finalScore">0</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Max Combo</p>
                        <p class="text-2xl font-black text-pink-400" id="maxComboDisplay">0</p>
                    </div>
                </div>
                
                <div class="space-y-3 mt-2">
                    <input type="text" id="playerName" placeholder="輸入特工代號" maxlength="10" class="w-full bg-black/50 border-2 border-purple-500/50 rounded-xl px-4 py-3 text-center text-white font-bold text-lg focus:outline-none focus:border-cyan-400 uppercase placeholder-slate-600">
                    <button id="submitBtn" onclick="submitScore()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-black py-3 rounded-xl text-xl shadow-[0_0_15px_rgba(147,51,234,0.5)] active:scale-95 transition-all tracking-widest">
                        上傳作戰數據
                    </button>
                </div>
                <button onclick="showLeaderboard()" class="text-slate-500 text-xs font-bold underline hover:text-white transition-colors">查看全服排行榜</button>
            </div>

            <!-- 排行榜畫面 -->
            <div id="leaderboardScreen" class="hidden space-y-4 w-full max-w-sm text-center">
                <h2 class="text-2xl font-black text-cyan-400 italic tracking-widest">🏆 RANKING TOP 10</h2>
                <div id="leaderboardList" class="leaderboard-scroll bg-slate-900/80 rounded-xl border border-cyan-500/30 p-2 space-y-1 min-h-[150px] text-left shadow-inner">
                    <p class="text-slate-500 text-xs py-8 italic text-center animate-pulse">同步時空數據中...</p>
                </div>
                <button onclick="resetGame()" class="w-full bg-slate-800 hover:bg-slate-700 text-white border border-slate-600 font-black py-4 rounded-xl text-lg shadow-lg active:scale-95 transition-all uppercase tracking-widest mt-2">
                    RETRY
                </button>
            </div>
        </div>

        <div class="absolute bottom-4 left-6 z-40 bg-black/50 px-4 py-2 rounded-xl backdrop-blur-sm border border-white/10">
            <span class="text-slate-400 text-xs font-bold uppercase tracking-widest mr-2">Score</span>
            <span id="currentScore" class="text-3xl font-mono font-black text-white">0</span>
        </div>
    </div>

    <!-- 音效引擎 (Web Audio API) -->
    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'slash') {
                // 光劍揮擊/砍斷聲 (低頻掃向高頻，帶點金屬感)
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'miss') {
                // 失誤/Combo中斷 (低沉下墜音)
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'gameover') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 1);
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1);
                osc.start();
                osc.stop(audioCtx.currentTime + 1);
            }
        }
    </script>

    <!-- 遊戲主邏輯 -->
    <script type="module">
        // === GAS 網址 (與上一版共用) ===
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzDxYACXJY-ZDzbngb3aUXhyCkWq-eTR37rxHDdTKwBpmd1DbHnJnOpm9HyUfBl935w/exec"; 

        window.requestCamera = requestCamera;
        window.startGame = startGame;
        window.submitScore = submitScore;
        window.showLeaderboard = showLeaderboard;
        window.resetGame = resetGame;

        // --- 狀態變數 ---
        let score = 0, combo = 0, maxCombo = 0, timeLeft = 45;
        let isPlaying = false, timerInterval;
        let animationFrameId;

        // --- 物理與視覺陣列 ---
        let blocks = [];      // 迎面飛來的方塊
        let particles = [];   // 斬擊的碎屑特效
        // 光劍軌跡追蹤 (支援雙手)
        let saberTrails = [ [], [] ]; 
        const MAX_TRAIL_LENGTH = 8;
        const SWIPE_SPEED_THRESHOLD = 15; // 需要揮動多快才能斬開

        // 方向定義 (對應角度)
        const DIRS = [
            { name: 'UP', angle: -Math.PI/2, icon: '⬆️', color: '#06b6d4' }, // Cyan
            { name: 'DOWN', angle: Math.PI/2, icon: '⬇️', color: '#ec4899' }, // Pink
            { name: 'LEFT', angle: Math.PI, icon: '⬅️', color: '#8b5cf6' },  // Purple
            { name: 'RIGHT', angle: 0, icon: '➡️', color: '#eab308' }      // Yellow
        ];

        // --- MediaPipe 初始化 ---
        let hands;
        try {
            hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({
                maxNumHands: 2,  // 支援雙手光劍！
                modelComplexity: 0,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            hands.onResults(onResults);
        } catch (e) { console.error("Hands init failed", e); }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        // --- 攝影機與 AI 分析 ---
        async function requestCamera() {
            try {
                const video = document.getElementById('input_video');
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: "user" } });
                video.srcObject = stream;
                await new Promise(r => { video.onloadedmetadata = () => video.play().then(r); });
                
                detectLoop();
                if (!animationFrameId) gameLoop(); // 啟動畫面渲染

                document.getElementById('setupScreen').classList.add('hidden');
                document.getElementById('startScreen').classList.remove('hidden');
            } catch (err) {
                alert("無法存取攝影機：" + err.message);
            }
        }

        async function detectLoop() {
            const video = document.getElementById('input_video');
            if (!video.paused && !video.ended && hands) await hands.send({ image: video });
            requestAnimationFrame(detectLoop);
        }

        // 追蹤手部位置，推入軌跡陣列
        function onResults(results) {
            const canvas = document.getElementById('output_canvas');
            // 每幀先清空最新的軌跡位置，如果沒偵測到就不更新
            let currentHands = [];

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (let i = 0; i < Math.min(results.multiHandLandmarks.length, 2); i++) {
                    const hand = results.multiHandLandmarks[i];
                    // 使用掌心 (0) 與中指根部 (9) 的平均值作為光劍基點
                    const x = (1 - ((hand[0].x + hand[9].x) / 2)) * canvas.width; // 鏡像反轉
                    const y = ((hand[0].y + hand[9].y) / 2) * canvas.height;
                    currentHands.push({x, y});
                }
            }

            // 更新軌跡陣列
            for (let i = 0; i < 2; i++) {
                if (currentHands[i]) {
                    saberTrails[i].push(currentHands[i]);
                    if (saberTrails[i].length > MAX_TRAIL_LENGTH) saberTrails[i].shift();
                } else {
                    // 若手消失，逐漸縮短軌跡
                    if (saberTrails[i].length > 0) saberTrails[i].shift();
                }
            }
        }

        // --- 遊戲邏輯 ---
        function startGame() {
            initAudio();
            score = 0; combo = 0; maxCombo = 0; timeLeft = 45;
            blocks = []; particles = []; saberTrails = [[], []];
            isPlaying = true;
            
            updateHUD();
            document.getElementById('overlay').classList.add('hidden');
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timerDisplay').innerText = timeLeft;
                if (timeLeft <= 10) document.getElementById('timerDisplay').classList.add('text-red-500', 'animate-pulse');
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function updateHUD(scored = false) {
            const scoreEl = document.getElementById('currentScore');
            const comboEl = document.getElementById('comboDisplay');
            scoreEl.innerText = score;
            comboEl.innerText = combo;

            if (scored) {
                scoreEl.classList.remove('score-bump');
                void scoreEl.offsetWidth; 
                scoreEl.classList.add('score-bump');
            }

            // Combo 樣式
            comboEl.className = 'text-2xl font-mono font-black transition-colors';
            if (combo === 0) comboEl.classList.add('text-slate-500');
            else if (combo < 10) comboEl.classList.add('text-cyan-400');
            else if (combo < 20) comboEl.classList.add('text-pink-400');
            else comboEl.classList.add('text-yellow-400', 'animate-pulse');
        }

        function breakCombo() {
            if (combo > 0) playSound('miss');
            combo = 0;
            updateHUD();
        }

        // 生成新方塊
        function spawnBlock() {
            const canvas = document.getElementById('output_canvas');
            const dir = DIRS[Math.floor(Math.random() * DIRS.length)];
            // 避免生在太邊緣
            const x = Math.random() * (canvas.width - 100) + 50; 
            
            // 速度隨時間加快
            const baseSpeed = 3 + (45 - timeLeft) * 0.1;

            blocks.push({
                x: x,
                y: -50, // 從畫面頂部上方出現
                size: 60,
                speedY: baseSpeed,
                dir: dir,
                active: true
            });
        }

        // 生成碎裂特效
        function spawnParticles(x, y, color) {
            for(let i=0; i<8; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1.0,
                    color: color
                });
            }
        }

        function endGame() {
            isPlaying = false;
            clearInterval(timerInterval);
            playSound('gameover');
            
            document.getElementById('timerDisplay').classList.remove('text-red-500', 'animate-pulse');
            document.getElementById('finalScore').innerText = score;
            document.getElementById('maxComboDisplay').innerText = maxCombo;
            
            const overlay = document.getElementById('overlay');
            overlay.classList.remove('hidden');
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            document.getElementById('leaderboardScreen').classList.add('hidden');
        }

        // --- 主迴圈 ---
        function gameLoop() {
            const canvas = document.getElementById('output_canvas');
            const ctx = canvas.getContext('2d');
            
            // 繪製背景 (半透明影片造就殘影效果，或是純暗背景)
            const video = document.getElementById('input_video');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (video && video.readyState >= 2) {
                ctx.save();
                ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
                // 降低影片亮度，凸顯遊戲元素
                ctx.globalAlpha = 0.3;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.restore();
            }

            // 畫一條虛構的地平線感
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.beginPath();
            for(let i=0; i<canvas.width; i+=40) {
                ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height);
            }
            ctx.stroke();

            if (isPlaying) {
                // 控制方塊生成頻率 (每 60 幀約 1 秒，隨時間變快)
                const spawnRate = Math.max(20, 60 - (45 - timeLeft)); 
                if (Math.random() < 1/spawnRate) spawnBlock();

                // 物理運算：方塊
                for (let i = blocks.length - 1; i >= 0; i--) {
                    let b = blocks[i];
                    b.y += b.speedY;

                    // 漏接判定
                    if (b.y > canvas.height + 50 && b.active) {
                        breakCombo();
                        b.active = false;
                    }

                    // 斬擊判定
                    if (b.active) {
                        for (let t = 0; t < 2; t++) {
                            const trail = saberTrails[t];
                            if (trail.length < 3) continue; // 需要足夠的點來計算速度與方向

                            const head = trail[trail.length - 1]; // 當前手部
                            const tail = trail[0]; // 幾幀前的手部

                            // 檢查手是否在方塊範圍內
                            const dist = Math.hypot(head.x - b.x, head.y - b.y);
                            if (dist < b.size) {
                                // 計算揮動速度與方向
                                const dx = head.x - tail.x;
                                const dy = head.y - tail.y;
                                const speed = Math.hypot(dx, dy);

                                if (speed > SWIPE_SPEED_THRESHOLD) {
                                    let swipeAngle = Math.atan2(dy, dx); // -PI 到 PI
                                    
                                    // 計算角度差 (使用三角函數的巧門處理越界)
                                    let angleDiff = Math.abs(Math.atan2(Math.sin(swipeAngle - b.dir.angle), Math.cos(swipeAngle - b.dir.angle)));

                                    // 容錯率：大約 45 度 (PI/4) 內都算揮對
                                    if (angleDiff < Math.PI / 3) {
                                        // 斬擊成功！
                                        b.active = false;
                                        playSound('slash');
                                        spawnParticles(b.x, b.y, b.dir.color);
                                        
                                        combo++;
                                        if (combo > maxCombo) maxCombo = combo;
                                        score += 10 + Math.floor(combo / 10) * 5; // 隨 Combo 增長分數
                                        updateHUD(true);
                                    } else {
                                        // 砍錯方向
                                        b.active = false;
                                        breakCombo();
                                        spawnParticles(b.x, b.y, '#ef4444'); // 紅色碎屑表示失誤
                                    }
                                }
                            }
                        }
                    }

                    // 繪製方塊
                    if (b.active) {
                        ctx.save();
                        ctx.translate(b.x, b.y);
                        
                        // 外框與發光
                        ctx.fillStyle = '#1e293b';
                        ctx.strokeStyle = b.dir.color;
                        ctx.lineWidth = 4;
                        ctx.shadowColor = b.dir.color;
                        ctx.shadowBlur = 15;
                        
                        ctx.beginPath();
                        ctx.roundRect(-b.size/2, -b.size/2, b.size, b.size, 10);
                        ctx.fill();
                        ctx.stroke();
                        
                        // 繪製箭頭
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = 'white';
                        ctx.font = '30px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(b.dir.icon, 0, 0);

                        ctx.restore();
                    }
                }

                // 清理掉出畫面的方塊
                blocks = blocks.filter(b => b.active || b.y <= canvas.height + 50);

                // 物理運算：碎屑
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx; p.y += p.vy;
                    p.vy += 0.5; // 重力
                    p.life -= 0.05;
                    
                    if (p.life > 0) {
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.life;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
                        ctx.fill();
                        ctx.globalAlpha = 1.0;
                    } else {
                        particles.splice(i, 1);
                    }
                }
            }

            // 繪製光劍軌跡 (不論是否在遊戲中都顯示，提供預覽)
            const saberColors = ['#06b6d4', '#ec4899']; // 一手青色，一手粉紅
            for (let t = 0; t < 2; t++) {
                const trail = saberTrails[t];
                if (trail.length < 2) continue;

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(trail[0].x, trail[0].y);
                for (let i = 1; i < trail.length; i++) {
                    // 使用二次曲線平滑軌跡
                    const xc = (trail[i].x + trail[i-1].x) / 2;
                    const yc = (trail[i].y + trail[i-1].y) / 2;
                    ctx.quadraticCurveTo(trail[i-1].x, trail[i-1].y, xc, yc);
                }
                ctx.lineTo(trail[trail.length-1].x, trail[trail.length-1].y);
                
                // 光劍外發光
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineWidth = 15;
                ctx.strokeStyle = saberColors[t];
                ctx.globalAlpha = 0.3;
                ctx.shadowColor = saberColors[t];
                ctx.shadowBlur = 20;
                ctx.stroke();

                // 光劍核心 (白色)
                ctx.lineWidth = 6;
                ctx.strokeStyle = '#ffffff';
                ctx.globalAlpha = 1.0;
                ctx.shadowBlur = 10;
                ctx.stroke();
                
                // 光劍劍柄/劍尖球體
                const head = trail[trail.length-1];
                ctx.beginPath();
                ctx.arc(head.x, head.y, 10, 0, Math.PI*2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                ctx.restore();
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // --- GAS 排行榜邏輯 ---
        async function submitScore() {
            const name = document.getElementById('playerName').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            if (!name) { showToast("特工，請輸入代號！"); return; }

            submitBtn.disabled = true;
            submitBtn.innerText = "資料上傳中...";

            const payload = { name, score, game: "BeatSaber", maxCombo };

            if (GAS_URL && GAS_URL.startsWith("https")) {
                try {
                    await fetch(GAS_URL, {
                        method: "POST", 
                        mode: "no-cors", // 取消 CORS 檢查
                        // 移除 headers: { "Content-Type": "application/json" } 以防預檢卡死
                        body: JSON.stringify(payload)
                    });
                    showToast("數據上傳成功！");
                    setTimeout(() => showLeaderboard(), 1000);
                } catch (e) { 
                    showToast("時空連線異常，上傳失敗"); 
                    submitBtn.disabled = false;
                    submitBtn.innerText = "重新上傳";
                }
            }
        }

        async function showLeaderboard() {
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('leaderboardScreen').classList.remove('hidden');
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '<p class="text-xs py-8 italic text-slate-500 text-center animate-pulse">正在存取全服排行榜...</p>';

            try {
                const response = await fetch(GAS_URL);
                if (!response.ok) throw new Error("Fetch failed");
                const top10 = await response.json();
                
                if (!top10 || top10.length === 0) {
                    list.innerHTML = '<p class="text-xs py-8 italic text-slate-500 text-center">無資料，你是第一個突破者！</p>';
                    return;
                }

                const sortedData = top10.sort((a, b) => b.score - a.score).slice(0, 10);
                
                list.innerHTML = sortedData.map((e, i) => `
                    <div class="flex justify-between items-center px-5 py-3 ${i<3?'bg-cyan-900/40 border-cyan-500/50':'bg-white/5 border-white/5'} rounded-xl mb-2 border text-sm">
                        <div class="flex items-center gap-4">
                            <span class="font-black text-lg ${i===0?'text-yellow-400':i===1?'text-slate-300':i===2?'text-orange-400':'text-slate-500'}">
                                ${i+1}
                            </span>
                            <span class="font-bold text-white uppercase">${e.name}</span>
                        </div>
                        <div class="text-right">
                            <span class="font-black text-cyan-400 text-lg">${e.score}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) { 
                list.innerHTML = `<p class="text-pink-500 text-sm py-6 font-bold text-center">伺服器無回應</p>`; 
            }
        }

        function resetGame() {
            document.getElementById('leaderboardScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('playerName').value = "";
        }
    </script>
