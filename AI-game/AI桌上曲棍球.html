<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 桌上曲棍球 - 節點追蹤版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    
    <style>
        body {
            background-color: #0f172a;
            color: white;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei';
            touch-action: none;
        }
        .game-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 2rem;
            background: #000000;
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.3), inset 0 0 30px rgba(255, 255, 255, 0.05);
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
            border: 4px solid #1e3a8a;
        }
        
        #input_video { display: none; }
        #output_canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .neon-text { text-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8; color: #e0f2fe; }
        .leaderboard-scroll { max-height: 200px; overflow-y: auto; }
        .leaderboard-scroll::-webkit-scrollbar { width: 4px; }
        .leaderboard-scroll::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100; transition: all 0.3s ease; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-2 bg-slate-950">

    <div id="toast" class="hidden bg-sky-600 text-white px-6 py-2 rounded-full shadow-[0_0_20px_rgba(56,189,248,0.5)] z-[100] flex items-center gap-3 border border-sky-400">
        <span id="toastMsg">訊息內容</span>
    </div>

    <div class="w-full max-lg flex justify-between items-end mb-2 px-2">
        <div class="text-left">
            <h1 class="text-2xl font-black tracking-tighter italic neon-text">AIR HOCKEY</h1>
            <p class="text-[10px] text-sky-400 font-bold uppercase tracking-widest">Digital Hand Tracking</p>
        </div>
        <div class="flex gap-4">
            <div class="text-center">
                <p class="text-[8px] text-slate-500 font-bold uppercase">AI Score</p>
                <p id="aiScoreDisplay" class="text-xl font-mono font-black text-red-500">0</p>
            </div>
            <div class="text-right">
                <p class="text-[8px] text-slate-500 font-bold uppercase">Lives</p>
                <p id="livesDisplay" class="text-xl font-mono font-black text-red-500">❤️❤️❤️</p>
            </div>
        </div>
    </div>

    <div class="game-container">
        <video id="input_video" playsinline muted></video>
        <canvas id="output_canvas" width="600" height="800"></canvas>

        <div id="overlay" class="absolute inset-0 bg-slate-950/80 z-50 rounded-2xl flex flex-col items-center justify-center p-6 backdrop-blur-sm transition-all duration-300">
            
            <div id="setupScreen" class="space-y-6 w-full max-w-sm text-center">
                <div class="text-7xl mb-2 animate-pulse">🖐️</div>
                <h2 class="text-2xl font-bold text-sky-300 tracking-widest">啟動手勢感應鏡頭</h2>
                <button onclick="requestCamera()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-black py-4 rounded-2xl text-xl shadow-[0_0_30px_rgba(56,189,248,0.6)] active:scale-95 transition-all tracking-widest">
                    允許攝影機權限
                </button>
            </div>

            <div id="startScreen" class="hidden space-y-4 w-full max-w-sm text-center">
                <div class="bg-slate-800/80 border border-sky-500/30 p-4 rounded-xl mb-2">
                    <p class="text-sm text-sky-400 font-bold mb-2">【感應測試中】</p>
                    <p class="text-xs text-slate-300">請在背景畫面確認是否出現 <b class="text-sky-400">藍色關節點</b><br>移動手掌即可同步操控藍色推槌！</p>
                </div>
                
                <h3 class="text-white font-bold tracking-widest">選擇難度開始挑戰</h3>
                <div class="flex gap-2">
                    <button onclick="startGame('easy')" class="flex-1 bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-500">初階</button>
                    <button onclick="startGame('normal')" class="flex-1 bg-yellow-600 text-white font-bold py-3 rounded-xl hover:bg-yellow-500">進階</button>
                    <button onclick="startGame('hard')" class="flex-1 bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-500">高手</button>
                </div>
            </div>

            <div id="resultScreen" class="hidden space-y-4 w-full max-w-sm text-center">
                <h2 class="text-5xl font-black text-white tracking-widest italic neon-text">GAME OVER</h2>
                <div class="bg-slate-900/80 p-6 rounded-2xl border border-white/10 flex justify-around items-center">
                    <div class="text-center">
                        <p class="text-[10px] text-slate-400 font-bold">AI</p>
                        <p class="text-4xl font-black text-red-500" id="finalAiScore">0</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[10px] text-sky-400 font-bold">Player</p>
                        <p class="text-5xl font-black text-sky-400" id="finalScore">0</p>
                    </div>
                </div>
                <div class="space-y-3 mt-2">
                    <input type="text" id="playerName" placeholder="輸入玩家代號" class="w-full bg-black border-2 border-sky-500/50 rounded-xl px-4 py-3 text-center text-white font-bold">
                    <button id="submitBtn" onclick="submitScore()" class="w-full bg-sky-600 text-white font-black py-3 rounded-xl text-xl">上傳紀錄</button>
                </div>
                <button onclick="showLeaderboard()" class="text-slate-500 text-xs underline">查看排行榜</button>
            </div>

            <div id="leaderboardScreen" class="hidden space-y-4 w-full max-w-sm text-center">
                <h2 class="text-2xl font-black text-sky-400 italic">🏆 RANKING TOP 10</h2>
                <div id="leaderboardList" class="leaderboard-scroll bg-slate-800/80 rounded-xl p-2 min-h-[150px] text-left shadow-inner"></div>
                <button onclick="resetGame()" class="w-full bg-slate-800 font-black py-4 rounded-xl text-lg mt-2">PLAY AGAIN</button>
            </div>
        </div>

        <div class="absolute bottom-4 left-4 z-40 bg-sky-900/50 px-4 py-2 rounded-xl backdrop-blur-sm border border-sky-400/30">
            <span id="currentScore" class="text-3xl font-mono font-black text-white">0</span>
        </div>
    </div>

    <script type="module">
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwmrn5bhdnS-NM59BHXS9hVqH4zLr2XiBYWofv3CZehpHXZQgdyN894UwsZndtjZs46SA/exec"; 

        window.requestCamera = requestCamera;
        window.startGame = startGame;
        window.submitScore = submitScore;
        window.showLeaderboard = showLeaderboard;
        window.resetGame = resetGame;

        let score = 0, aiScore = 0, playerLives = 3;
        let isPlaying = false, animationFrameId;
        let targetX = 300, targetY = 600, currentHandLandmarks = null;

        const C_WIDTH = 600, C_HEIGHT = 800, GOAL_WIDTH = 200;
        const p = { x: 300, y: 400, vx: 0, vy: 0, r: 25, mass: 1, color: '#eab308' };
        const m1 = { x: 300, y: 650, vx: 0, vy: 0, r: 40, mass: 5, color: '#38bdf8' };
        const m2 = { x: 300, y: 150, vx: 0, vy: 0, r: 40, mass: 5, color: '#ef4444', speed: 6, reactionTime: 0.15 };
        const FRICTION = 0.99, RESTITUTION = 0.85;

        // MediaPipe 手部偵測
        let hands;
        try {
            hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            hands.onResults(results => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    currentHandLandmarks = results.multiHandLandmarks[0];
                    targetX = (1 - ((currentHandLandmarks[0].x + currentHandLandmarks[9].x) / 2)) * C_WIDTH; 
                    targetY = ((currentHandLandmarks[0].y + currentHandLandmarks[9].y) / 2) * C_HEIGHT;
                    
                    if (targetY < C_HEIGHT / 2 + m1.r) targetY = C_HEIGHT / 2 + m1.r;
                    if (targetY > C_HEIGHT - m1.r) targetY = C_HEIGHT - m1.r;
                    if (targetX < m1.r) targetX = m1.r;
                    if (targetX > C_WIDTH - m1.r) targetX = C_WIDTH - m1.r;
                } else {
                    currentHandLandmarks = null;
                }
            });
        } catch (e) { console.error(e); }

        async function requestCamera() {
            try {
                const video = document.getElementById('input_video');
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: "user" } });
                video.srcObject = stream;
                await video.play();
                detectLoop();
                if (!animationFrameId) gameLoop();
                document.getElementById('setupScreen').classList.add('hidden');
                document.getElementById('startScreen').classList.remove('hidden');
            } catch (err) { alert("攝影機錯誤：" + err.message); }
        }

        async function detectLoop() {
            const video = document.getElementById('input_video');
            if (!video.paused && !video.ended && hands) await hands.send({ image: video });
            requestAnimationFrame(detectLoop);
        }

        function startGame(diff) {
            score = 0; aiScore = 0; playerLives = 3; isPlaying = true;
            if(diff === 'easy') m2.speed = 3;
            else if(diff === 'normal') m2.speed = 6;
            else m2.speed = 10;
            updateHUD();
            document.getElementById('overlay').classList.add('hidden');
            resetPuck();
        }

        function updateHUD(playerScored = false) {
            document.getElementById('currentScore').innerText = score;
            document.getElementById('aiScoreDisplay').innerText = aiScore;
            document.getElementById('livesDisplay').innerText = '❤️'.repeat(Math.max(0, playerLives)) + '🖤'.repeat(Math.max(0, 3 - playerLives));
        }

        function resetPuck() { p.vx = 0; p.vy = 0; p.x = C_WIDTH / 2; p.y = C_HEIGHT / 2; }

        function gameLoop() {
            const canvas = document.getElementById('output_canvas');
            const ctx = canvas.getContext('2d');
            
            const oldM1X = m1.x, oldM1Y = m1.y;
            m1.x += (targetX - m1.x) * 0.5;
            m1.y += (targetY - m1.y) * 0.5;
            m1.vx = m1.x - oldM1X; m1.vy = m1.y - oldM1Y;

            if (isPlaying) {
                // AI 簡單邏輯
                const oldM2X = m2.x, oldM2Y = m2.y;
                let aiTX = (p.y < C_HEIGHT/2) ? p.x : C_WIDTH/2;
                let aiTY = (p.y < C_HEIGHT/2) ? Math.min(p.y - m2.r, C_HEIGHT/2 - m2.r) : 100;
                m2.x += (aiTX - m2.x) * 0.2;
                m2.y += (aiTY - m2.y) * 0.2;
                m2.vx = m2.x - oldM2X; m2.vy = m2.y - oldM2Y;

                p.vx *= FRICTION; p.vy *= FRICTION;
                p.x += p.vx; p.y += p.vy;

                // 邊界反彈
                if (p.x - p.r < 0 || p.x + p.r > C_WIDTH) { p.vx *= -RESTITUTION; p.x = (p.x < p.r) ? p.r : C_WIDTH - p.r; }
                
                const inGoal = p.x > C_WIDTH/2 - GOAL_WIDTH/2 && p.x < C_WIDTH/2 + GOAL_WIDTH/2;
                if (!inGoal) {
                    if (p.y - p.r < 0 || p.y + p.r > C_HEIGHT) { p.vy *= -RESTITUTION; p.y = (p.y < p.r) ? p.r : C_HEIGHT - p.r; }
                } else {
                    if (p.y < -p.r) { score++; updateHUD(true); resetPuck(); }
                    else if (p.y > C_HEIGHT + p.r) { aiScore++; playerLives--; updateHUD(); if (playerLives <= 0) endGame(); else resetPuck(); }
                }

                // 碰撞
                [m1, m2].forEach(m => {
                    const dist = Math.hypot(p.x - m.x, p.y - m.y);
                    if (dist < m.r + p.r) {
                        const nx = (p.x - m.x) / dist, ny = (p.y - m.y) / dist;
                        const rvx = p.vx - m.vx, rvy = p.vy - m.vy;
                        const vAlongN = rvx * nx + rvy * ny;
                        if (vAlongN < 0) {
                            const impulse = -(1 + RESTITUTION) * vAlongN / (1/m.mass + 1/p.mass);
                            p.vx += impulse * nx / p.mass; p.vy += impulse * ny / p.mass;
                        }
                    }
                });
            }

            // 繪圖
            ctx.clearRect(0, 0, C_WIDTH, C_HEIGHT);
            const video = document.getElementById('input_video');
            if (video.readyState >= 2) {
                ctx.save(); ctx.translate(C_WIDTH, 0); ctx.scale(-1, 1); ctx.globalAlpha = 0.2;
                ctx.drawImage(video, 0, 0, C_WIDTH, C_HEIGHT); ctx.restore();
            }

            // 畫線
            ctx.strokeStyle = '#0284c7'; ctx.lineWidth = 4; ctx.strokeRect(0, 0, C_WIDTH, C_HEIGHT);
            ctx.beginPath(); ctx.moveTo(0, C_HEIGHT/2); ctx.lineTo(C_WIDTH, C_HEIGHT/2); ctx.stroke();
            ctx.strokeRect(C_WIDTH/2 - GOAL_WIDTH/2, -10, GOAL_WIDTH, 20);
            ctx.strokeRect(C_WIDTH/2 - GOAL_WIDTH/2, C_HEIGHT - 10, GOAL_WIDTH, 20);

            // 畫手部節點 (手部骨骼視覺回饋)
            if (currentHandLandmarks) {
                ctx.fillStyle = '#38bdf8';
                ctx.strokeStyle = 'rgba(56, 189, 248, 0.5)';
                ctx.lineWidth = 2;
                
                // 畫骨架連線
                const connections = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
                connections.forEach(([i, j]) => {
                    ctx.beginPath();
                    ctx.moveTo((1 - currentHandLandmarks[i].x) * C_WIDTH, currentHandLandmarks[i].y * C_HEIGHT);
                    ctx.lineTo((1 - currentHandLandmarks[j].x) * C_WIDTH, currentHandLandmarks[j].y * C_HEIGHT);
                    ctx.stroke();
                });
                
                // 畫關節點
                currentHandLandmarks.forEach(pt => {
                    ctx.beginPath();
                    ctx.arc((1 - pt.x) * C_WIDTH, pt.y * C_HEIGHT, 4, 0, Math.PI*2);
                    ctx.fill();
                });
            }

            // 畫實體
            [[m2, '#ef4444'], [m1, '#38bdf8'], [p, '#facc15']].forEach(([ent, col]) => {
                ctx.fillStyle = col; ctx.beginPath(); ctx.arc(ent.x, ent.y, ent.r, 0, Math.PI*2); ctx.fill();
            });

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function endGame() {
            isPlaying = false;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('finalAiScore').innerText = aiScore;
            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
        }

        async function submitScore() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) return alert("請輸入代號");
            try {
                await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ name, score }) });
                showLeaderboard();
            } catch (e) { alert("上傳失敗"); }
        }

        async function showLeaderboard() {
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('leaderboardScreen').classList.remove('hidden');
            const list = document.getElementById('leaderboardList');
            list.innerHTML = "讀取中...";
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                list.innerHTML = data.sort((a,b)=>b.score-a.score).slice(0,10).map((e,i)=>`
                    <div class="flex justify-between p-2 mb-1 bg-white/5 rounded">
                        <span>${i+1}. ${e.name}</span>
                        <span class="text-sky-400 font-bold">${e.score}</span>
                    </div>
                `).join('');
            } catch(e) { list.innerHTML = "讀取失敗"; }
        }

        function resetGame() {
            document.getElementById('leaderboardScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
        }
    </script>
</body>
</html>
