<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學加減交叉拼圖</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fcfb; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .scale-in-center { animation: scale-in-center 0.4s cubic-bezier(0.250, 0.460, 0.450, 0.940) both; }
        @keyframes scale-in-center { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 select-none overflow-x-hidden">

    <!-- Top Bar -->
    <div class="w-full max-w-md flex justify-between mb-4">
        <div class="bg-white border-2 border-emerald-100 rounded-full px-5 py-1.5 flex items-center gap-2 shadow-sm">
            <i data-lucide="star" class="text-yellow-400 fill-yellow-400 w-5 h-5"></i>
            <span class="font-black text-emerald-800">第 <span id="level-display">1</span> 關</span>
        </div>
        <div class="bg-white border-2 border-emerald-100 rounded-full px-5 py-1.5 flex items-center gap-2 shadow-sm">
            <i data-lucide="clock" class="text-emerald-500 w-5 h-5"></i>
            <span id="timer-display" class="font-mono font-black text-emerald-800 text-lg">0:00</span>
        </div>
    </div>

    <!-- Stage Info -->
    <div class="mb-6 text-center">
        <div id="stage-badge" class="px-6 py-2 rounded-2xl text-sm font-black shadow-lg mb-1 bg-emerald-600 text-white">
            載入中...
        </div>
    </div>

    <!-- Game Board Container -->
    <div id="board-container" class="relative w-full flex flex-col items-center">
        <div id="game-board" class="relative bg-white rounded-[40px] shadow-2xl border-[8px] border-emerald-50 p-6 flex flex-col justify-between transition-all duration-500 max-w-sm w-full min-h-[350px]">
            <!-- Content Injected by JS -->
        </div>
        
        <!-- PLAY Overlay -->
        <div id="play-overlay" class="absolute inset-0 z-50 bg-white/60 backdrop-blur-sm flex flex-col items-center justify-center rounded-[40px] hidden">
            <button onclick="startGame()" class="group relative flex items-center justify-center w-24 h-24 bg-emerald-600 rounded-full shadow-2xl hover:bg-emerald-700 hover:scale-110 active:scale-95 transition-all">
                <div class="absolute inset-0 rounded-full bg-emerald-400 animate-ping opacity-20"></div>
                <i data-lucide="play" class="text-white fill-white ml-1 w-10 h-10"></i>
            </button>
            <p class="mt-4 font-black text-emerald-800 text-lg">點擊 PLAY 開始遊戲</p>
        </div>
    </div>

    <!-- Controls -->
    <div class="mt-8 w-full max-w-sm flex flex-col gap-4">
        <button onclick="checkAnswer()" id="check-btn" class="w-full bg-emerald-600 text-white font-black py-4 rounded-3xl shadow-xl hover:bg-emerald-700 active:scale-95 transition-all flex items-center justify-center gap-2 text-xl">
            檢查答案 <i data-lucide="chevron-right"></i>
        </button>
        <button onclick="resetLevel()" class="w-full bg-white border-2 border-emerald-100 text-emerald-500 py-3 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-emerald-50 active:scale-95">
            <i data-lucide="refresh-cw" class="w-5 h-5"></i> 重玩本關
        </button>
    </div>

    <!-- Message -->
    <div id="message-box" class="fixed bottom-24 bg-rose-600 text-white px-8 py-4 rounded-full shadow-2xl animate-bounce z-[100] flex items-center gap-2 opacity-0 transition-opacity pointer-events-none">
        <i data-lucide="alert-circle" class="w-5 h-5"></i>
        <span id="message-text" class="font-bold">內容</span>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="fixed inset-0 bg-black/60 backdrop-blur-md z-[200] flex items-center justify-center p-6 hidden">
        <!-- Content Injected by JS -->
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Variables
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'math-puzzle-html';

        let state = {
            user: null,
            level: 1,
            timer: 0,
            isRunning: false,
            hasStarted: false,
            puzzle: null,
            inputs: {},
            wrongCells: [],
            userName: ""
        };

        let timerInterval = null;

        // Init
        async function init() {
            lucide.createIcons();
            
            // Auth (Rule 3)
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, (u) => {
                state.user = u;
                render();
            });

            generatePuzzle(state.level);
        }

        // Logic
        window.startGame = () => {
            state.hasStarted = true;
            state.isRunning = true;
            startTimer();
            render();
        };

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                state.timer++;
                document.getElementById('timer-display').innerText = formatTime(state.timer);
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            state.isRunning = false;
        }

        function formatTime(s) {
            return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
        }

        function generatePuzzle(lvl) {
            state.inputs = {};
            state.wrongCells = [];
            
            const stage = Math.ceil(lvl / 5);
            const isAddition = stage === 1 || stage === 3;
            const allowNegative = stage >= 3;
            const isSpecial = lvl % 5 === 0;
            const range = lvl > 15 ? 35 : 20;

            const getBaseNum = () => {
                let n = Math.floor(Math.random() * range) + 2;
                if (allowNegative && Math.random() > 0.5) n = -n;
                return n;
            };

            const op = isAddition ? (x, y) => x + y : (x, y) => x - y;
            let grid = [[], [], []];
            let hidden = [];

            if (isSpecial) {
                if (stage === 2) { // 純減法正數
                    for (let r = 0; r < 2; r++) {
                        const n5 = Math.floor(Math.random() * 10) + 1;
                        const n4 = Math.floor(Math.random() * 10) + 1;
                        const n3 = n5 + n4;
                        const n2 = Math.floor(Math.random() * 10) + 1;
                        const n1 = n3 + n2;
                        grid[r] = [n1, n2, n3, n4, n5];
                    }
                    for (let c = 0; c < 5; c++) {
                        if (grid[0][c] <= grid[1][c]) grid[0][c] += (grid[1][c] - grid[0][c] + 5);
                    }
                    grid[0][2] = grid[0][0] - grid[0][1];
                    grid[0][4] = grid[0][2] - grid[0][3];
                } else {
                    for (let r = 0; r < 2; r++) {
                        const n1 = getBaseNum(); const n2 = getBaseNum(); const n3 = op(n1, n2);
                        const n4 = getBaseNum(); const n5 = op(n3, n4);
                        grid[r] = [n1, n2, n3, n4, n5];
                    }
                }
                for (let c = 0; c < 5; c++) grid[2][c] = op(grid[0][c], grid[1][c]);
                const pos = [];
                for(let r=0; r<3; r++) for(let c=0; c<5; c++) pos.push(`${r}-${c}`);
                pos.sort(() => Math.random() - 0.5).slice(0, 7).forEach(p => hidden.push(p));
            } else {
                if (stage === 2) { // 3x3 純減法
                    const i = Math.floor(Math.random() * 15) + 1;
                    const f = Math.floor(Math.random() * 15) + 1;
                    const c = i + f;
                    const h = Math.floor(Math.random() * 15) + 1;
                    const e = Math.floor(Math.random() * 15) + 1;
                    const b = h + e;
                    const g = i + h;
                    const d = f + e;
                    const a = c + b;
                    grid = [[a, b, c], [d, e, f], [g, h, i]];
                } else {
                    let a = getBaseNum(), b = getBaseNum(), d = getBaseNum(), e = getBaseNum();
                    grid = [[a, b, op(a,b)], [d, e, op(d,e)], [op(a,d), op(b,e), op(op(a,b), op(d,e))]];
                }
                const pos = ['0-0','0-1','0-2','1-0','1-1','1-2','2-0','2-1','2-2'];
                pos.sort(() => Math.random() - 0.5).slice(0, 4).forEach(p => hidden.push(p));
            }

            state.puzzle = { grid, hidden, isAddition, isSpecial, stage };
            
            if (lvl === 1 && !state.hasStarted) {
                stopTimer();
            } else {
                startTimer();
            }
            render();
        }

        window.checkAnswer = () => {
            const p = state.puzzle;
            const rows = 3;
            const cols = p.isSpecial ? 5 : 3;
            const currentGrid = p.grid.map((row, r) => row.map((cell, c) => {
                const key = `${r}-${c}`;
                return p.hidden.includes(key) ? parseInt(state.inputs[key]) : cell;
            }));

            let errors = [];
            const op = p.isAddition ? (x, y) => x + y : (x, y) => x - y;

            for(let r=0; r<3; r++) {
                const g = currentGrid[r];
                if (p.isSpecial) {
                    if (isNaN(g[0]) || isNaN(g[1]) || isNaN(g[2]) || isNaN(g[3]) || isNaN(g[4]) ||
                        op(g[0], g[1]) !== g[2] || op(g[2], g[3]) !== g[4]) {
                        errors.push(`${r}-0`,`${r}-1`,`${r}-2`,`${r}-3`,`${r}-4`);
                    }
                } else {
                    if (isNaN(g[0]) || isNaN(g[1]) || isNaN(g[2]) || op(g[0], g[1]) !== g[2]) {
                        errors.push(`${r}-0`,`${r}-1`,`${r}-2`);
                    }
                }
            }

            for(let c=0; c<cols; c++) {
                if (isNaN(currentGrid[0][c]) || isNaN(currentGrid[1][c]) || isNaN(currentGrid[2][c]) ||
                    op(currentGrid[0][c], currentGrid[1][c]) !== currentGrid[2][c]) {
                    errors.push(`0-${c}`,`1-${c}`,`2-${c}`);
                }
            }

            state.wrongCells = [...new Set(errors)];
            if (state.wrongCells.length === 0) {
                handleWin();
            } else {
                showToast("計算不正確，請檢查標紅處！");
            }
            render();
        };

        function handleWin() {
            stopTimer();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            if (state.level % 5 === 0) {
                showModal('nameInput');
            } else {
                showModal('levelClear');
            }
        }

        window.resetLevel = () => {
            generatePuzzle(state.level);
        };

        // UI Rendering
        function render() {
            document.getElementById('level-display').innerText = state.level;
            
            const stageBadge = document.getElementById('stage-badge');
            const s = state.puzzle.stage;
            stageBadge.innerText = (s === 1 ? "第一階段：基礎加法" : s === 2 ? "第二階段：純減法 (正數)" : s === 3 ? "第三階段：加法 (含負數)" : "第四階段：減法 (含負數)") + (state.puzzle.isSpecial ? " • 3x5 挑戰" : "");
            stageBadge.className = `px-6 py-2 rounded-2xl text-sm font-black shadow-lg mb-1 ${state.puzzle.isSpecial ? 'bg-rose-500 text-white' : 'bg-emerald-600 text-white'}`;

            const board = document.getElementById('game-board');
            board.className = `relative bg-white rounded-[40px] shadow-2xl border-[8px] border-emerald-50 p-6 flex flex-col justify-between transition-all duration-500 ${state.puzzle.isSpecial ? 'max-w-2xl w-full' : 'max-w-sm w-full'}`;
            board.innerHTML = "";

            state.puzzle.grid.forEach((row, rIdx) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = "flex justify-between items-center relative z-10";
                
                row.forEach((cell, cIdx) => {
                    const key = `${rIdx}-${cIdx}`;
                    const isHidden = state.puzzle.hidden.includes(key);
                    const isWrong = state.wrongCells.includes(key);
                    
                    const cellEl = document.createElement('div');
                    cellEl.className = `flex-shrink-0 w-11 h-11 sm:w-14 sm:h-14 rounded-full border-4 flex items-center justify-center font-bold transition-all duration-300 ${isHidden ? (isWrong ? 'border-rose-500 bg-rose-50 ring-4 ring-rose-100' : 'border-emerald-200 bg-emerald-50 focus-within:ring-4 ring-emerald-100') : 'border-emerald-600 bg-white text-emerald-800 shadow-sm'}`;
                    
                    if (isHidden) {
                        const input = document.createElement('input');
                        input.type = "number";
                        input.value = state.inputs[key] || "";
                        input.disabled = !state.hasStarted && state.level === 1;
                        input.className = `w-full bg-transparent text-center outline-none ${state.puzzle.isSpecial ? 'text-sm sm:text-base' : 'text-xl'}`;
                        input.oninput = (e) => {
                            state.inputs[key] = e.target.value;
                            state.wrongCells = state.wrongCells.filter(k => k !== key);
                        };
                        cellEl.appendChild(input);
                    } else {
                        const span = document.createElement('span');
                        span.className = state.puzzle.isSpecial ? 'text-sm sm:text-base' : 'text-xl';
                        span.innerText = cell;
                        cellEl.appendChild(span);
                    }
                    rowDiv.appendChild(cellEl);

                    // Horizontal Symbols
                    const symbClass = "text-xl sm:text-2xl font-black text-slate-700 mx-0.5 sm:mx-1";
                    const opText = state.puzzle.isAddition ? "+" : "-";
                    if (cIdx === 0) rowDiv.insertAdjacentHTML('beforeend', `<span class="${symbClass}">${opText}</span>`);
                    if (cIdx === 1) rowDiv.insertAdjacentHTML('beforeend', `<span class="${symbClass}">=</span>`);
                    if (state.puzzle.isSpecial && cIdx === 2) rowDiv.insertAdjacentHTML('beforeend', `<span class="${symbClass}">${opText}</span>`);
                    if (state.puzzle.isSpecial && cIdx === 3) rowDiv.insertAdjacentHTML('beforeend', `<span class="${symbClass}">=</span>`);
                });
                board.appendChild(rowDiv);

                // Vertical Symbols
                if (rIdx < 2) {
                    const vDiv = document.createElement('div');
                    vDiv.className = "flex justify-between items-center px-4 py-1";
                    row.forEach((_, cIdx) => {
                        vDiv.insertAdjacentHTML('beforeend', `<div class="w-11 sm:w-14 text-center font-black text-slate-700 text-xl sm:text-2xl">${rIdx === 0 ? (state.puzzle.isAddition ? '+' : '-') : '='}</div>`);
                    });
                    board.appendChild(vDiv);
                }
            });

            // Play Overlay logic
            const overlay = document.getElementById('play-overlay');
            if (state.level === 1 && !state.hasStarted) overlay.classList.remove('hidden');
            else overlay.classList.add('hidden');
            
            lucide.createIcons();
        }

        function showToast(text) {
            const box = document.getElementById('message-box');
            document.getElementById('message-text').innerText = text;
            box.style.opacity = "1";
            setTimeout(() => box.style.opacity = "0", 3000);
        }

        async function showModal(type) {
            const modal = document.getElementById('modal-container');
            modal.classList.remove('hidden');
            modal.innerHTML = "";

            if (type === 'levelClear') {
                modal.innerHTML = `<div class="bg-white p-10 rounded-[40px] w-full max-w-xs text-center shadow-2xl scale-in-center border-b-8 border-emerald-200">
                    <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="check-circle" class="text-emerald-500 w-12 h-12"></i></div>
                    <h2 class="text-3xl font-black mb-2 text-slate-800">真厲害！</h2>
                    <p class="text-slate-500 mb-8 font-bold text-lg">數學運算難不倒你！</p>
                    <button id="next-lv-btn" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg hover:bg-emerald-700">下一關</button>
                </div>`;
                document.getElementById('next-lv-btn').onclick = () => {
                    state.level++;
                    modal.classList.add('hidden');
                    generatePuzzle(state.level);
                };
            } else if (type === 'nameInput') {
                modal.innerHTML = `<div class="w-full max-w-sm text-center text-white scale-in-center">
                    <i data-lucide="trophy" class="mx-auto text-yellow-300 w-24 h-24 mb-6"></i>
                    <h2 class="text-4xl font-black mb-2">達成大關卡！</h2>
                    <p class="mb-10 text-emerald-50 font-medium">請輸入你的姓名以登錄榮譽榜：</p>
                    <div class="bg-white rounded-3xl p-6 shadow-2xl">
                        <input id="user-name-input" placeholder="玩家姓名..." class="w-full bg-slate-50 text-emerald-900 px-8 py-4 rounded-2xl outline-none font-black text-2xl mb-4 border border-slate-200" />
                        <button id="submit-score-btn" class="w-full bg-yellow-400 text-emerald-900 py-4 rounded-2xl font-black text-xl shadow-xl">提交成績</button>
                    </div>
                </div>`;
                document.getElementById('submit-score-btn').onclick = async () => {
                    const name = document.getElementById('user-name-input').value;
                    if (!name.trim()) return;
                    state.userName = name;
                    const stageKey = Math.ceil(state.level / 5) * 5;
                    // Rule 1: Secure path
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `leaderboard_${stageKey}`), {
                        name: name,
                        time: state.timer,
                        timestamp: serverTimestamp()
                    });
                    showModal('leaderboard');
                };
            } else if (type === 'leaderboard') {
                modal.className = "fixed inset-0 bg-slate-50 z-[200] flex flex-col p-8 scale-in-center";
                modal.innerHTML = `<h2 class="text-3xl font-black text-slate-800 flex items-center justify-center gap-4 mb-10">🏆 第 ${Math.ceil(state.level/5)*5} 關榮譽榜</h2>
                    <div id="lb-list" class="flex-1 space-y-4 overflow-y-auto pr-2 custom-scrollbar">載入中...</div>
                    <button id="lb-next-btn" class="mt-8 bg-emerald-600 text-white py-6 rounded-[32px] font-black text-2xl shadow-xl">${state.level === 20 ? '完賽' : '挑戰下一階段'}</button>`;
                
                const stageKey = Math.ceil(state.level / 5) * 5;
                const lbCol = collection(db, 'artifacts', appId, 'public', 'data', `leaderboard_${stageKey}`);
                onSnapshot(lbCol, (snap) => {
                    const data = snap.docs.map(d => d.data());
                    const sorted = data.sort((a,b) => a.time - b.time).slice(0, 10);
                    const list = document.getElementById('lb-list');
                    if(list) {
                        list.innerHTML = sorted.map((item, idx) => `<div class="flex items-center justify-between p-6 bg-white rounded-3xl shadow-sm border border-slate-100">
                            <div class="flex items-center gap-6"><span class="font-black text-3xl w-10 text-center ${idx < 3 ? 'text-yellow-500' : 'text-slate-200'}">${idx+1}</span><span class="font-black text-xl text-slate-700">${item.name}</span></div>
                            <div class="font-mono font-black text-2xl text-emerald-600">${formatTime(item.time)}</div>
                        </div>`).join("");
                    }
                });

                document.getElementById('lb-next-btn').onclick = () => {
                    if (state.level === 20) {
                        showModal('finished');
                    } else {
                        state.level++;
                        modal.className = "fixed inset-0 bg-black/60 backdrop-blur-md z-[200] flex items-center justify-center p-6 hidden";
                        generatePuzzle(state.level);
                    }
                };
            } else if (type === 'finished') {
                modal.className = "fixed inset-0 bg-white flex flex-col items-center justify-center p-8 z-[300]";
                modal.innerHTML = `<i data-lucide="trophy" class="text-yellow-400 w-32 h-32 mb-8 animate-bounce"></i>
                    <h1 class="text-5xl font-black text-slate-800 mb-4 text-center">終極數學大師！</h1>
                    <p class="text-2xl text-slate-500 mb-16 font-bold text-center">恭喜完成 20 關的所有挑戰</p>
                    <button onclick="window.location.reload()" class="bg-emerald-600 text-white px-16 py-6 rounded-full font-black text-3xl shadow-2xl">再玩一次</button>`;
            }
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
