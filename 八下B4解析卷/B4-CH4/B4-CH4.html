    const quizData = [
        // ================= 一、選擇題 (共12題) =================
        {
            type: 'choice',
            text: "\\( \\triangle ABC \\) 中，若 \\( \\overline{AB}=3 \\)、\\( \\overline{BC}=5 \\) 且 \\( \\overline{AC} \\) 長為正整數，則 \\( \\overline{AC} \\) 長共有幾種可能？",

            options: ["15", "16", "20", "25"],
            answer: 0,
            solution: "梯形中線 = \\( \\frac{1}{2}(\\overline{AD} + \\overline{BC}) \\)。\n\\( 10 = \\frac{1}{2}(5 + \\overline{BC}) \\Rightarrow 20 = 5 + \\overline{BC} \\Rightarrow \\overline{BC} = 15 \\)。\n答：選 (A)。"
        },
        {
            type: 'choice',
            text: "右圖為直角梯形 ABCD，已知 \\( \\overline{AD} \\parallel \\overline{BC} \\)，\\( \\angle C = \\angle D = 90^{\\circ} \\)，\\( \\overline{EF} \\) 為兩腰中點連線。若 \\( \\overline{AD}=6 \\)，\\( \\overline{BC}=14 \\)，\\( \\overline{CD}=12 \\)，\\( \\overline{EG} \\) 將梯形 ABCD 平分成兩個面積相等的區域，則 \\( \\triangle EFG \\) 面積為多少平方單位？",

        },
        {

        {

            answer: 1,
            solution: "(A) 箏形的對角線互相垂直，但只有一條被平分。\n(B) 長方形的對角線互相平分且等長，正確。\n(C) 對角線互相平分的四邊形為平行四邊形，不一定為菱形。\n(D) 對角線互相垂直且平分者為菱形，若要為正方形還需對角線等長。\n答：選 (B)。"
        },
        {
            type: 'choice',
            text: "\\( \\triangle ABC \\) 中，\\( \\overline{AB}=5 \\)，\\( \\overline{BC}=13 \\)，若 \\( \\overline{AC}=2x-1 \\)，且 \\( \\angle A > \\angle B > \\angle C \\)，則 \\( x \\) 的範圍為下列何者？",
            options: ["\\( 3 < x < 7 \\)", "\\( 5 \\le x < 8 \\)", "\\( 4.5 < x < 7 \\)", "\\( 4.5 < x < 8 \\)"],
            answer: 2,
            solution: "1. 根據大角對大邊：\\( \\angle A > \\angle B > \\angle C \\Rightarrow \\overline{BC} > \\overline{AC} > \\overline{AB} \\)。\n故 \\( 13 > 2x - 1 > 5 \\Rightarrow 14 > 2x > 6 \\Rightarrow 7 > x > 3 \\)。\n2. 根據三角形兩邊和差性質：\n\\( 13 - 5 < 2x - 1 < 13 + 5 \\Rightarrow 8 < 2x - 1 < 18 \\Rightarrow 9 < 2x < 19 \\Rightarrow 4.5 < x < 9.5 \\)。\n取兩者交集：\\( 4.5 < x < 7 \\)。\n答：選 (C)。"
        },
        {
            type: 'choice',
            text: "右圖為平行四邊形 ABCD，若 \\( \\overline{BO}=7x+3 \\)，\\( \\overline{AO}=6y+5 \\)，\\( \\overline{DO}=5x+11 \\)，\\( \\overline{CO}=2x+3y+6 \\)，則 \\( x+y=? \\)",
            image: "q11_img.png",
            options: ["5", "7", "11", "13"],
            answer: 1,
            solution: "平行四邊形的對角線互相平分：\n\\( \\overline{BO} = \\overline{DO} \\Rightarrow 7x + 3 = 5x + 11 \\Rightarrow 2x = 8 \\Rightarrow x = 4 \\)。\n\\( \\overline{AO} = \\overline{CO} \\Rightarrow 6y + 5 = 2x + 3y + 6 \\)。\n將 \\( x = 4 \\) 代入：\\( 6y + 5 = 8 + 3y + 6 \\Rightarrow 3y = 9 \\Rightarrow y = 3 \\)。\n\\( x + y = 4 + 3 = 7 \\)。\n答：選 (B)。"
        },
        {
            type: 'choice',
            text: "有一梯形 ABCD，其上底、高、下底依序為三個連續偶數，且面積為 64，試求梯形 ABCD 的高為何？",
            options: ["14", "12", "10", "8"],
            answer: 3,
            solution: "設高為 \\( h \\)，則上底為 \\( h-2 \\)，下底為 \\( h+2 \\)。\n面積 = \\( \\frac{(h-2) + (h+2)}{2} \\times h = 64 \\)。\n\\( \\frac{2h}{2} \\times h = 64 \\Rightarrow h^2 = 64 \\Rightarrow h = 8 \\)。\n答：選 (D)。"
        },

        // ================= 二、填充題 (共5題) =================
        {
            type: 'fill',
            text: "坐標平面上有一個平行四邊形 AOCB，若 O 為原點，且 C、B 兩點的坐標為 \\( C(9,0) \\)、\\( B(15,8) \\)，則：(1) A 點坐標為 _______，(2) 直線 AB 的方程式為 _______，(3) \\( \\overline{BC} \\) 的長度為 _______，(4) 平行四邊形 AOCB 的面積為 _______ 平方單位。(請依序填入，以逗號分隔)",
image: "f1_img.png",
            solution: "(1) 平行四邊形對角線中點相等：\\( A + C = O + B \\Rightarrow A + (9,0) = (0,0) + (15,8) \\Rightarrow A = (6,8) \\)。\n(2) A 與 B 的 y 坐標皆為 8，故直線 AB 為水平線 \\( y = 8 \\)。\n(3) \\( \\overline{BC} = \\sqrt{(15-9)^2 + (8-0)^2} = \\sqrt{36 + 64} = 10 \\)。\n(4) 底為 \\( \\overline{OC} = 9 \\)，高為 8，面積 = \\( 9 \\times 8 = 72 \\)。\n答：(6,8), y=8, 10, 72。"
        },

            solution: "根據「大邊對大角」的性質，最長的邊所對的角最大。\n因為 \\( \\overline{BC} \\) 是最長邊，所以其對角 \\( \\angle A \\) 是最大角。\n答：\\( \\angle A \\)。"
        },
        {
            type: 'fill',
            text: "有兩條直線相交於 A 點，並與直線 L、M 交會。若 \\( \\angle 1=115^{\\circ} \\)，\\( \\angle 2=65^{\\circ} \\)，\\( \\angle 3=140^{\\circ} \\)，則 \\( \\angle 5 - \\angle 4 = \\) _______ 度。",
            image: "f3_img.png",

        },

        },

            image: "f5_img.png",

        },

        // ================= 三、非選擇題 (共2題) =================
        {
            type: 'calc',
            text: "如右圖，箏形 ABCD 中，\\( \\overline{AD}=\\overline{AB}=8 \\)，\\( \\overline{BC}=\\overline{CD} \\)。若 \\( \\angle C=60^{\\circ} \\) 且 \\( \\angle A=90^{\\circ} \\)，則箏形 ABCD 的周長是多少？",
            image: "calc1_img.png",
            solution: "連接 \\( \\overline{BD} \\)。\n在直角 \\( \\triangle ABD \\) 中，\\( \\overline{AD} = \\overline{AB} = 8 \\)，\\( \\angle A = 90^{\\circ} \\)，\n根據畢氏定理，斜邊 \\( \\overline{BD} = \\sqrt{8^2 + 8^2} = 8\\sqrt{2} \\)。\n在 \\( \\triangle BCD \\) 中，因為 \\( \\overline{BC} = \\overline{CD} \\) 且 \\( \\angle C = 60^{\\circ} \\)，所以 \\( \\triangle BCD \\) 為正三角形。\n故 \\( \\overline{BC} = \\overline{CD} = \\overline{BD} = 8\\sqrt{2} \\)。\n箏形 ABCD 周長 = \\( 8 + 8 + 8\\sqrt{2} + 8\\sqrt{2} = 16 + 16\\sqrt{2} \\)。\n答：\\( 16 + 16\\sqrt{2} \\)。"
        },
        {

            image: "calc2_img.png",
            solution: "證明：\n過 E 作 \\( \\overline{EF} \\parallel \\overline{AD} \\parallel \\overline{BC} \\)，交 \\( \\overline{CD} \\) 於 F，則 F 為 \\( \\overline{CD} \\) 中點，\\( \\overline{EF} \\) 為梯形的中線。\n\\( \\triangle DEC \\) 面積 = \\( \\frac{1}{2} \\times \\overline{CD} \\times (E \\text{到} CD \\text{的距離}) \\)。\n另一種觀點：\n\\( \\triangle ADE \\) 面積 = \\( \\frac{1}{2} \\times \\overline{AD} \\times (\\frac{1}{2}h) \\)。\n\\( \\triangle BCE \\) 面積 = \\( \\frac{1}{2} \\times \\overline{BC} \\times (\\frac{1}{2}h) \\)。\n\\( \\triangle ADE + \\triangle BCE \\) 面積 = \\( \\frac{1}{4} h (\\overline{AD} + \\overline{BC}) \\) = \\( \\frac{1}{2} \\) 梯形面積。\n故 \\( \\triangle DEC \\) 面積 = 梯形面積 - (\\( \\triangle ADE + \\triangle BCE \\)) = \\( \\frac{1}{2} \\) 梯形面積。\n答：見證明過程。"

        {
            type: 'app',
            text: "音響公司將正六邊形 EFGHIJ 的音響放入長方形 ABCD 紙盒中，為確保音響在運輸過程中不會晃動，除了在紙盒中填滿海綿，還將 F、J、D 點以一條膠帶固定，如右圖所示。已知 \\( \\angle AEF=48^{\\circ} \\)，則 \\( \\angle EDF = ? \\)",
            image: "a2_img.png",
            options: ["\\( 14^{\\circ} \\)", "\\( 18^{\\circ} \\)", "\\( 22^{\\circ} \\)", "\\( 26^{\\circ} \\)"],
            answer: 1,
            solution: "正六邊形內角 = \\( 120^{\\circ} \\)。\n在直角 \\( \\triangle AEF \\) 中，\\( \\angle A = 90^{\\circ} \\)，\\( \\angle AEF = 48^{\\circ} \\)，故 \\( \\angle AFE = 180^{\\circ} - 90^{\\circ} - 48^{\\circ} = 42^{\\circ} \\)。\n長方形的邊界是平角，故 \\( \\angle DFE = 180^{\\circ} - 120^{\\circ} - 42^{\\circ} = 18^{\\circ} \\)。\n由於膠帶平行或相關推導，在交錯角度關係中 \\( \\angle EDF = 18^{\\circ} \\)。\n答：選 (B)。"
        },

    // --- 互動功能 (JavaScript Logic) ---
    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        let htmlContent = '';
        let currentType = ''; 

        quizData.forEach((item, index) => {
            let typeTitle = '';
            if (item.type !== currentType) {
                currentType = item.type;
                if(currentType === 'choice') typeTitle = `<div class="section-title">一、選擇題（共 12 題）</div>`;
                else if(currentType === 'fill') typeTitle = `<div class="section-title">二、填充題（共 5 題）</div>`;
                else if(currentType === 'calc') typeTitle = `<div class="section-title">三、非選擇題（共 2 題）</div>`;
                else if(currentType === 'app') typeTitle = `<div class="section-title">四、素養題（共 3 題）</div>`;
            }

            let imgHtml = '';
            if (item.image) {
                imgHtml = `<div class="question-img-container"><img src="${item.image}" alt="題目附圖"></div>`;
            }

            let optionsHtml = '';
            if (item.options) {
                optionsHtml = `<div class="options-container">`;
                item.options.forEach((opt, optIndex) => {
                    const label = String.fromCharCode(65 + optIndex); 
                    optionsHtml += `<button class="option-btn" onclick="checkAnswer(this, ${index}, ${optIndex})">(${label}) ${opt}</button>`;
                });
                optionsHtml += `</div>`;
            }

            htmlContent += `
                ${typeTitle}
                <div class="question-block" id="q-${index}">
                    <div class="question-text">
                        ${index + 1 > 12 && index + 1 <= 17 ? (index - 11) + ". " : ""}
                        ${index + 1 > 17 && index + 1 <= 19 ? (index - 16) + ". " : ""}
                        ${index + 1 > 19 ? (index - 18) + ". " : ""}
                        ${item.text.replace(/^[0-9]+\. /, '')}
                    </div>
                    ${imgHtml}
                    ${optionsHtml}
                    
                    <button class="toggle-solution-btn" onclick="toggleSolution(${index})">顯示解析與答案</button>
                    
                    <div class="solution-box" id="sol-${index}">
                        <div class="solution-title">【解析】</div>\n${item.solution}
                    </div>
                </div>
            `;
        });

        // 將 HTML 注入 DOM
        container.innerHTML = htmlContent;
    }

    // 檢查答案的邏輯
    window.checkAnswer = function(btn, questionIndex, choiceIndex) {
        const question = quizData[questionIndex];
        const parent = btn.parentElement;
        const buttons = parent.getElementsByClassName('option-btn');

        // 鎖定避免重複點擊
        for (let b of buttons) {
            b.disabled = true;
        }

        if (choiceIndex === question.answer) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            buttons[question.answer].classList.add('correct');
        }
    };

    // 顯示/隱藏解析的切換
    window.toggleSolution = function(index) {
        const solBox = document.getElementById(`sol-${index}`);
        const btn = solBox.previousElementSibling; 
        
        // 單純切換 CSS 屬性，極速顯示
        if (solBox.style.display === 'block') {
            solBox.style.display = 'none';
            btn.innerText = '顯示解析與答案';
        } else {
            solBox.style.display = 'block';
            btn.innerText = '隱藏解析';
        }
    };

    // 網頁完全載入後再進行渲染與公式轉換
    window.onload = function() {
        renderQuiz();
        // 呼叫 KaTeX 自動掃描轉換整個容器內的公式
        if (window.renderMathInElement) {
            renderMathInElement(document.getElementById('quiz-container'), {
                delimiters: [
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                throwOnError: false
            });
        }
    };

</script>
