                    answer: 1,
                    explanation: "第 23 排 $a_{23} = 87$，第 22 排 $a_{22} = 84$。可推得公差 $d = 87 - 84 = 3$。<br>帶入公式求首項：$a_{23} = a_1 + 22d \\Rightarrow 87 = a_1 + 22 \\times 3 \\Rightarrow 87 = a_1 + 66 \\Rightarrow a_1 = 21$。<br><strong>【答案】(B)</strong>"
                }
            ]
        }
    ];

    const quizContent = document.getElementById('quiz-content');

    // 渲染題目
    quizData.forEach((sectionData, sIdx) => {
        // 標題區塊
        const sectionTitle = document.createElement('div');
        sectionTitle.className = 'section-title';
        sectionTitle.innerText = sectionData.section;
        quizContent.appendChild(sectionTitle);

        // 題目迴圈
        sectionData.questions.forEach((q, qIdx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-container';

            // 1. 題目文字
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerHTML = q.text;
            qDiv.appendChild(qText);

            // 2. 圖片 (如果有)
            if (q.image) {
                const img = document.createElement('img');
                img.src = q.image;
                img.alt = "附圖";
                img.className = 'question-image';
                qDiv.appendChild(img);
            }

            // 3. 選擇題選項
            if (q.type === 'choice' && q.options) {
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                q.options.forEach((optText, optIdx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    const optionLabel = String.fromCharCode(65 + optIdx); // A, B, C, D
                    btn.innerHTML = `(${optionLabel}) ${optText}`;
                    
                    // 點擊事件處理
                    btn.onclick = () => {
                        // 禁用同題所有按鈕
                        const allBtns = optionsGrid.querySelectorAll('button');
                        allBtns.forEach(b => b.disabled = true);

                        // 判斷對錯
                        if (optIdx === q.answer) {
                            btn.classList.add('correct');
                        } else {
                            btn.classList.add('wrong');
                            allBtns[q.answer].classList.add('correct'); // 顯示正確答案
                        }
                    };
                    optionsGrid.appendChild(btn);
                });
                qDiv.appendChild(optionsGrid);
            }

            // 4. 顯示解析按鈕
            const toggleBtn = document.createElement('button');
            toggleBtn.className = 'toggle-exp-btn';
            toggleBtn.innerText = '顯示解析與答案';
            
            // 5. 解析區塊
            const expDiv = document.createElement('div');
            expDiv.className = 'explanation';
            expDiv.innerHTML = "<strong>【解析】</strong><br>" + q.explanation;

            toggleBtn.onclick = () => {
                if (expDiv.style.display === 'none' || expDiv.style.display === '') {
                    expDiv.style.display = 'block';
                    toggleBtn.innerText = '隱藏解析';
                } else {
                    expDiv.style.display = 'none';
                    toggleBtn.innerText = '顯示解析與答案';
                }
            };

            qDiv.appendChild(toggleBtn);
            qDiv.appendChild(expDiv);

            quizContent.appendChild(qDiv);
        });
    });

</script>
</body>
</html>
