    // --- 互動功能 (JavaScript Logic) ---
    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        let htmlContent = '';
        let currentType = ''; 

        quizData.forEach((item, index) => {
            let typeTitle = '';
            if (item.type !== currentType) {
                currentType = item.type;
                if(currentType === 'choice') typeTitle = `<div class="section-title">一、選擇題（共 12 題）</div>`;
                else if(currentType === 'fill') typeTitle = `<div class="section-title">二、填充題（共 5 題）</div>`;
                else if(currentType === 'calc') typeTitle = `<div class="section-title">三、非選擇題（共 2 題）</div>`;
                else if(currentType === 'app') typeTitle = `<div class="section-title">四、生活素養題（共 3 題）</div>`;
            }

            let imgHtml = '';
            if (item.image) {
                imgHtml = `<div class="question-img-container"><img src="${item.image}" alt="題目附圖"></div>`;
            }

            let optionsHtml = '';
            if (item.options) {
                optionsHtml = `<div class="options-container">`;
                item.options.forEach((opt, optIndex) => {
                    const label = String.fromCharCode(65 + optIndex); 
                    optionsHtml += `<button class="option-btn" onclick="checkAnswer(this, ${index}, ${optIndex})">(${label}) ${opt}</button>`;
                });
                optionsHtml += `</div>`;
            }

            htmlContent += `
                ${typeTitle}
                <div class="question-block" id="q-${index}">
                    <div class="question-text">
                        ${index + 1 > 12 && index + 1 <= 17 ? (index - 11) + ". " : ""}
                        ${index + 1 > 17 && index + 1 <= 19 ? (index - 16) + ". " : ""}
                        ${index + 1 > 19 ? (index - 18) + ". " : ""}
                        ${item.text.replace(/^[0-9]+\. /, '')}
                    </div>
                    ${imgHtml}
                    ${optionsHtml}
                    
                    <button class="toggle-solution-btn" onclick="toggleSolution(${index})">顯示解析與答案</button>
                    
                    <div class="solution-box" id="sol-${index}">
                        <div class="solution-title">【解析】</div>\n${item.solution}
                    </div>
                </div>
            `;
        });

        // 將 HTML 注入 DOM
        container.innerHTML = htmlContent;
    }

    // 檢查答案的邏輯
    window.checkAnswer = function(btn, questionIndex, choiceIndex) {
        const question = quizData[questionIndex];
        const parent = btn.parentElement;
        const buttons = parent.getElementsByClassName('option-btn');

        // 鎖定避免重複點擊
        for (let b of buttons) {
            b.disabled = true;
        }

        if (choiceIndex === question.answer) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            buttons[question.answer].classList.add('correct');
        }
    };

    // 顯示/隱藏解析的切換
    window.toggleSolution = function(index) {
        const solBox = document.getElementById(`sol-${index}`);
        const btn = solBox.previousElementSibling; 
        
        // 單純切換 CSS 屬性，極速顯示
        if (solBox.style.display === 'block') {
            solBox.style.display = 'none';
            btn.innerText = '顯示解析與答案';
        } else {
            solBox.style.display = 'block';
            btn.innerText = '隱藏解析';
        }
    };

    // 網頁完全載入後再進行渲染與公式轉換
    window.onload = function() {
        renderQuiz();
        // 呼叫 KaTeX 自動掃描轉換整個容器內的公式
        if (window.renderMathInElement) {
            renderMathInElement(document.getElementById('quiz-container'), {
                delimiters: [
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                throwOnError: false
            });
        }
    };

</script>
