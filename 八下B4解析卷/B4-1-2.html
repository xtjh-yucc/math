    // 渲染函數
    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        let html = '';

        quizData.forEach((q, index) => {
            // 處理區塊標題
            if (q.section) {
                html += `<div class="section-title">${q.section}</div>`;
            }

            html += `<div class="question-block" id="q-block-${index}">
                        <div class="question-text">
                            <span class="question-number">${q.number}</span>
                            <span class="question-content">${q.question}</span>
                        </div>`;
            
            // 圖片處理
            if (q.image) {
                html += `<img class="question-image" src="${q.image}" alt="題目圖片 (${q.image} 尚未放入目錄)">`;
            }

            // 選擇題選項處理
            if (q.type === 'choice') {
                const labels = ['(A)', '(B)', '(C)', '(D)'];
                html += `<div class="options">`;
                q.options.forEach((opt, optIndex) => {
                    html += `<button class="option-btn" onclick="checkAnswer(${index}, ${optIndex}, ${q.answer})">${labels[optIndex]} ${opt}</button>`;
                });
                html += `</div>`;
            } else if (q.type === 'fill' || q.type === 'calc') {
                html += `<div style="margin-left: 25px; margin-bottom: 10px; font-weight: bold; color: #1565c0;">答案：${q.answer}</div>`;
            }

            // 顯示/隱藏解析按鈕
            html += `<button class="toggle-btn" onclick="toggleExplanation(${index})">顯示 / 隱藏解析</button>
                     <div class="explanation-box" id="exp-${index}">${q.explanation}</div>
                     </div>`;
        });

        container.innerHTML = html;
        
        // 重新呼叫 MathJax 進行渲染
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    // 選擇題檢查對錯互動
    function checkAnswer(qIndex, selectedIdx, correctIdx) {
        const block = document.getElementById(`q-block-${qIndex}`);
        const btns = block.querySelectorAll('.option-btn');
        
        // 鎖定所有選項
        btns.forEach(btn => btn.disabled = true);

        if (selectedIdx === correctIdx) {
            btns[selectedIdx].classList.add('correct');
        } else {
            btns[selectedIdx].classList.add('wrong');
            btns[correctIdx].classList.add('correct');
        }
        
        // 自動顯示解析
        document.getElementById(`exp-${qIndex}`).style.display = 'block';
    }

    // 切換解析顯示
    function toggleExplanation(qIndex) {
        const expBox = document.getElementById(`exp-${qIndex}`);
        if (expBox.style.display === 'none' || expBox.style.display === '') {
            expBox.style.display = 'block';
        } else {
            expBox.style.display = 'none';
        }
    }

    // 初始化渲染
    window.onload = renderQuiz;

</script>
