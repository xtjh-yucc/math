                {
                    type: "choice",
                    question: "1. 網球反彈高度問題：如圖，欣怡將一顆網球自 $256$ 公分高處自由落下，已知每次落地後彈跳的高度為原來高度的 $\\frac{3}{4}$ 倍，則此球第5次彈跳的高度為多少公分？",
                    image: "B4-1-3q_literacy_1_img.png",
                    options: [
                        "(A) $\\frac{243}{4}$",
                        "(B) $\\frac{255}{4}$",
                        "(C) $\\frac{262}{4}$",
                        "(D) $\\frac{266}{4}$"
                    ],
                    answerIndex: 0,
                    explanation: "解析：初始高度 $256$ 公分，每次彈起為原來的 $\\frac{3}{4}$。<br>第5次彈跳高度等於 $256 \\times (\\frac{3}{4})^5 = 256 \\times \\frac{243}{1024} = 2^8 \\times \\frac{243}{2^{10}} = \\frac{243}{2^2} = \\frac{243}{4}$ 公分。<br><b>答案：(A)</b>"
                },
                {
                    type: "choice",
                    question: "2. 《孫子算經》中，有道題目：「今有出門望見九隄，隄有九木，木有九枝，枝有九葉，葉有九華，華有九實，實有九禽，禽有九毛，毛有九色，問各有幾何？」這是一道首項為 $9$，公比也為 $9$ 的等比數列問題，請以 $9$ 的乘方表示「毛」共有多少？",
                    options: [
                        "(A) $9^6$",
                        "(B) $9^7$",
                        "(C) $9^8$",
                        "(D) $9^9$"
                    ],
                    answerIndex: 1,
                    explanation: "解析：依層遞關係列出數量：<br>木：$9^1$<br>枝：$9 \\times 9 = 9^2$<br>葉：$9^2 \\times 9 = 9^3$<br>華(花)：$9^3 \\times 9 = 9^4$<br>實：$9^4 \\times 9 = 9^5$<br>禽：$9^5 \\times 9 = 9^6$<br>毛：$9^6 \\times 9 = 9^7$<br><b>答案：(B) $9^7$</b>"
                },
                {
                    type: "choice",
                    question: "3. 研究員紅芯發現某種新元素，其特性相當不穩定，每 $10$ 天為一個半衰期。也就是說，每經過 $10$ 天，數量變為原來的一半。若原有 $50$ 萬顆此元素原子，則最少幾天後將剩下不到 $1000$ 顆？",
                    options: [
                        "(A) 100",
                        "(B) 90",
                        "(C) 50",
                        "(D) 10"
                    ],
                    answerIndex: 1,
                    explanation: "解析：每 $10$ 天數量變為原來的一半（公比 $r = \\frac{1}{2}$）。<br>設過了 $n$ 個半衰期，數量 $a_n = 500000 \\times (\\frac{1}{2})^n < 1000$。<br>化簡得 $(\\frac{1}{2})^n < \\frac{1000}{500000} = \\frac{1}{500}$，即 $2^n > 500$。<br>因 $2^8 = 256, 2^9 = 512$，故最小整數 $n = 9$。<br>經過 $9$ 個半衰期，也就是 $9 \\times 10 = 90$ 天。<br><b>答案：(B) 90</b>"
                }
            ]
        }
    ];

    const container = document.getElementById('quiz-container');

    // 渲染所有題目
    quizData.forEach((sectionData, sectionIndex) => {
        // 加入大題標題
        const sectionTitle = document.createElement('div');
        sectionTitle.className = 'section-title';
        sectionTitle.innerHTML = sectionData.section;
        container.appendChild(sectionTitle);

        // 遍歷該大題的每一小題
        sectionData.items.forEach((item, itemIndex) => {
            const block = document.createElement('div');
            block.className = 'question-block';

            // 1. 題目文字
            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerHTML = item.question;
            block.appendChild(qText);

            // 2. 圖片預留位 (如果有)
            if (item.image) {
                const img = document.createElement('img');
                img.src = item.image;
                img.alt = `請在此放置圖片：${item.image}`;
                img.className = 'question-img';
                block.appendChild(img);
            }

            // 3. 互動選項 (如果是選擇題)
            if (item.type === 'choice' && item.options) {
                const ul = document.createElement('ul');
                ul.className = 'options-list';
                
                item.options.forEach((optStr, optIdx) => {
                    const li = document.createElement('li');
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerHTML = optStr;
                    
                    // 點擊選項邏輯
                    btn.onclick = function() {
                        // 鎖定所有選項
                        const allBtns = ul.querySelectorAll('.option-btn');
                        allBtns.forEach(b => b.disabled = true);
                        
                        // 判斷對錯
                        if (optIdx === item.answerIndex) {
                            btn.classList.add('btn-correct');
                        } else {
                            btn.classList.add('btn-wrong');
                            // 標示出正確答案
                            allBtns[item.answerIndex].classList.add('btn-correct');
                        }
                    };
                    
                    li.appendChild(btn);
                    ul.appendChild(li);
                });
                block.appendChild(ul);
            }

            // 4. 解析按鈕與區塊
            const toggleBtn = document.createElement('button');
            toggleBtn.className = 'toggle-btn';
            toggleBtn.innerText = '📝 顯示解析與答案';
            
            const expDiv = document.createElement('div');
            expDiv.className = 'explanation';
            expDiv.innerHTML = item.explanation;
            
            toggleBtn.onclick = function() {
                if (expDiv.style.display === 'block') {
                    expDiv.style.display = 'none';
                    toggleBtn.innerText = '📝 顯示解析與答案';
                } else {
                    expDiv.style.display = 'block';
                    toggleBtn.innerText = '隱藏解析';
                }
            };
            
            block.appendChild(toggleBtn);
            block.appendChild(expDiv);

            container.appendChild(block);
        });
    });

    // 呼叫 MathJax 渲染剛動態生成的 LaTeX 公式
    window.onload = function() {
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    };
</script>
