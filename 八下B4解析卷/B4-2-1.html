    // 初始化渲染試卷
    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        let currentSection = '';

        quizData.forEach((item, index) => {
            // 處理標題分類
            if (item.section !== currentSection) {
                currentSection = item.section;
                const sectionTitle = document.createElement('div');
                sectionTitle.className = 'section-title';
                sectionTitle.innerHTML = currentSection;
                container.appendChild(sectionTitle);
            }

            const qBlock = document.createElement('div');
            qBlock.className = 'question-block';

            // 題幹文字
            let html = `<div class="question-text">${item.question}</div>`;

            // 圖片預留區塊
            if (item.img) {
                html += `<div class="img-placeholder">
                            [圖片放置區：${item.img}]<br>
                            <img src="${item.img}" alt="尚未放置圖片" onerror="this.style.display='none';">
                         </div>`;
            }

            // 選擇題互動按鈕
            if (item.type === 'mcq') {
                html += `<div class="options-container" id="options-${index}">`;
                item.options.forEach((opt, optIdx) => {
                    html += `<button class="option-btn" onclick="checkAnswer(${index}, ${optIdx}, this)">${opt}</button>`;
                });
                html += `</div>`;
            }

            // 顯示解析按鈕與解析區塊
            html += `<button class="btn-explain" onclick="toggleExplain(${index})">顯示解答與解析</button>`;
            html += `<div class="explanation" id="explain-${index}">${item.explanation}</div>`;

            qBlock.innerHTML = html;
            container.appendChild(qBlock);
        });
    }

    // 檢查答案邏輯 (選擇題)
    function checkAnswer(qIdx, optIdx, btn) {
        const item = quizData[qIdx];
        const container = document.getElementById(`options-${qIdx}`);
        const buttons = container.querySelectorAll('.option-btn');

        // 點擊後禁用所有按鈕
        buttons.forEach(b => b.disabled = true);

        if (optIdx === item.answer) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            // 自動標示正確答案
            buttons[item.answer].classList.add('correct');
        }
    }

    // 切換顯示/隱藏解析
    function toggleExplain(qIdx) {
        const exp = document.getElementById(`explain-${qIdx}`);
        const btn = exp.previousElementSibling;
        if (exp.style.display === 'block') {
            exp.style.display = 'none';
            btn.innerText = '顯示解答與解析';
        } else {
            exp.style.display = 'block';
            btn.innerText = '隱藏解答與解析';
        }
    }

    // 網頁載入後執行渲染與數學公式解析
    window.onload = function() {
        renderQuiz();
        // 強制 MathJax 重新掃描動態生成的 HTML，將 $ 符號轉換為精美數學式
        if (window.MathJax) {
            MathJax.typesetPromise().catch(function (err) {
                console.error('MathJax 渲染失敗: ' + err.message);
            });
        }
    };
</script>
