<html lang="zh-Hant">

    <!-- Tailwind CSS -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- MathJax for LaTeX Rendering -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']]
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; color: #1e293b; overflow-x: hidden; }
        .math-text { font-family: 'Noto Serif TC', serif; }
        .textbook-card { box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.08); border: 1px solid #e2e8f0; }
        mjx-container { outline: none !important; font-size: 1.15em !important; }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .animate-fall { position: absolute; animation-name: fall; animation-timing-function: linear; animation-iteration-count: infinite; }
        .ui-text { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- 核心輔助函數：洗牌演算法 ---
        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        // --- 圖標組件 ---
        const Icon = ({ name, className }) => {
            const icons = {
                chevronLeft: <path d="m15 18-6-6 6-6"/>,
                chevronRight: <path d="m9 18 6-6-6-6"/>,
                lightbulb: (
                    <>
                        <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/>
                        <path d="M9 18h6"/>
                        <path d="M10 22h4"/>
                    </>
                ),
                sparkles: (
                    <>
                        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                        <path d="M5 3v4"/>
                        <path d="M19 17v4"/>
                        <path d="M3 5h4"/>
                        <path d="M17 19h4"/>

                ),

                    </>
                ),
                calculator: (
                    <>
                        <rect width="16" height="20" x="4" y="2" rx="2"/>
                        <line x1="8" x2="16" y1="6" y2="6"/>
                        <line x1="16" x2="16" y1="14" y2="18"/>
                        <path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/>
                    </>
                ),
                trophy: (
                    <>
                        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
                        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
                        <path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
                        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
                        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
                    </>
                ),
                refresh: (
                    <>
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
                        <path d="M16 16h5v5"/>
                    </>
                ),
                book: (
                    <>
                        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/>
                        <path d="M8 6h10"/><path d="M8 10h10"/><path d="M8 14h10"/>
                    </>
                ),
                printer: (
                    <>
                        <polyline points="6 9 6 2 18 2 18 9" />
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
                        <rect x="6" y="14" width="12" height="8" />
                    </>
                ),
                party: (
                    <>
                        <path d="M20 21a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2"/>
                        <path d="M2 7h20"/><path d="M5 11v8"/><path d="M9 11v8"/><path d="M13 11v8"/><path d="M17 11v8"/>
                    </>
                )
            };
            return (
                <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {icons[name]}
                </svg>
            );
        };

        const ConfettiEffect = () => {
            const pieces = useMemo(() => Array.from({ length: 70 }).map((_, i) => ({
                id: i, left: Math.random() * 100, delay: Math.random() * 2, duration: 3 + Math.random() * 2,
                size: 15 + Math.random() * 25, emoji: ['🌸', '✨', '🎉', '🎊', '⭐', '🎈', '🍀'][Math.floor(Math.random() * 7)]
            })), []);
            return (
                <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                    {pieces.map(p => (
                        <div key={p.id} className="animate-fall" style={{ left: `${p.left}%`, top: `-50px`, animationDelay: `${p.delay}s`, animationDuration: `${p.duration}s`, fontSize: `${p.size}px` }}>
                            {p.emoji}
                        </div>
                    ))}
                </div>
            );
        };

        // --- 2-1 函數與函數圖形 完整題庫 (每一單元均擴充至 10 題) ---
        const STAGES = [
            {
                id: 0, title: "單元1 函數的判別", description: "判斷關係式或圖形是否表示 y 是 x 的函數", targetCorrect: 5,
                problems: [
                    { text: "判斷 $y = 2x + 3$，則 $y$ 是否為 $x$ 的函數？", hint: "檢查對於每一個 $x$，是否恰有一個 $y$ 對應。", answers: ["是"], distractors: ["不是", "不一定", "無法判斷"], 
                      analysis: "步驟一：觀察關係式 $y = 2x + 3$。\n步驟二：對於任意一個實數 $x$，經由乘以 2 後加 3，都會得到唯一的結果 $y$。\n步驟三：這屬於一對一或多對一的關係，符合函數定義。\n結論：是。" },
                    { text: "判斷 $x = y^2$，則 $y$ 是否為 $x$ 的函數？", hint: "取 $x=1$ 帶入看看。", answers: ["不是"], distractors: ["是", "不一定", "以上皆非"], 
                      analysis: "步驟一：設 $x = 1$。\n步驟二：代入關係式得 $1 = y^2$，則 $y$ 可能為 $1$ 或 $-1$。\n步驟三：一個 $x$ 值對應到兩個不同的 $y$ 值（一對多）。\n結論：不符合函數定義，故不是。" },
                    { text: "下列何者可以表示 $y$ 是 $x$ 的函數？", hint: "垂直線法判別圖形。", answers: ["$y = |x|$"], distractors: ["$|y| = x$", "$x = y^2 + 5$", "$x^2 + y^2 = 9$"], 
                      analysis: "步驟一：檢查 $y = |x|$。每個數 $x$ 絕對值只有一個，正確。\n步驟二：檢查 $|y| = x$。若 $x=1$，$y$ 可為 $1, -1$，錯。\n步驟三：檢查 $x^2+y^2=9$（圓形）。垂直線會交於兩點，錯。\n結論：$y = |x|$ 是函數。" },
                    { text: "若 $y = 5$，則 $y$ 是否為 $x$ 的函數？", hint: "常數函數也是一種函數。", answers: ["是"], distractors: ["不是", "不一定", "視 $x$ 而定"], 
                      analysis: "步驟一：觀察 $y = 5$。\n步驟二：無論 $x$ 取什麼值，對應到的 $y$ 值恆為 $5$。\n步驟三：這屬於「多對一」的對應，符合函數定義。\n結論：是。" },
                    { text: "圓的面積 $y$ 與其半徑 $x$ 的關係中，$y$ 是否為 $x$ 的函數？", hint: "面積公式 $y = \\pi x^2$。", answers: ["是"], distractors: ["不是", "不一定", "半徑必須為整數時才是"], 
                      analysis: "步驟一：公式為 $y = \\pi x^2$。\n步驟二：每一種長度的半徑只會算出唯一的面積。\n步驟三：符合函數定義。\n結論：是。" },
                    { text: "判斷：$x$ 為平年月份天數，$y$ 為該月名稱，則 $y$ 是 $x$ 的函數嗎？", hint: "取 $x=31$ 看看對應幾個月份。", answers: ["不是"], distractors: ["是", "只有潤年是", "只有 2 月是"], analysis: "步驟一：當 $x=31$ 時，對應的月份有 1, 3, 5, 7, 8, 10, 12 月。\n步驟二：這是一對多。\n結論：不是。" },
                    { text: "判斷一次函數 $f(x) = ax+b$，則 $y$ 是否為 $x$ 的函數？", hint: "一次函數必為函數嗎？", answers: ["是"], distractors: ["不是", "視 $b$ 是否為 0 而定", "不一定"], analysis: "步驟一：一次函數是一條直線且不與 $y$ 軸垂直。\n步驟二：每一個 $x$ 都有唯一的 $y$ 對應。\n結論：是。" },
                    { text: "判斷 $y = x^2 - 1$，則 $y$ 是否為 $x$ 的函數？", hint: "平方後減 1 的結果唯一嗎？", answers: ["是"], distractors: ["不是", "只有 $x>0$ 時是", "不一定"], analysis: "步驟一：任意實數 $x$ 的平方值是唯一的。\n步驟二：減去 1 之後得到的 $y$ 仍是唯一的。\n結論：是。" },
                    { text: "垂直 $x$ 軸的直線（如 $x=3$）其圖形是否為函數圖形？", hint: "對於 $x=3$，有幾個 $y$？", answers: ["不是"], distractors: ["是", "視斜率而定", "常數函數圖形"], analysis: "步驟一：在 $x=3$ 上，$x=3$ 對應到無限多個 $y$ 值。\n步驟二：這是一對多（甚至是無限多）。\n結論：不是。" },
                    { text: "判斷：$x$ 為出生年份，$y$ 為身份證號碼，則 $y$ 是否為 $x$ 的函數？", hint: "同一年出生的人只有一個號碼嗎？", answers: ["不是"], distractors: ["是", "只有獨子是", "不一定"], analysis: "步驟一：同一個年份 $x$ 下，有成千上萬個不同的身份證號碼 $y$。\n步驟二：這是一對多。\n結論：不是。" }
                ]
            },
            {
                id: 1, title: "單元2 求函數值", description: "計算給定自變數時的應變數值 (Evaluation)", targetCorrect: 5,
                problems: [
                    { text: "若 $f(x) = 3x - 4$，求 $f(2)$。", hint: "代入 $x=2$。", answers: ["$2$"], distractors: ["$10$", "$5$", "$6$"], 
                      analysis: "步驟一：將 $x=2$ 代入式子。\n步驟二：$f(2) = 3 \\times 2 - 4$。\n步驟三：$f(2) = 6 - 4 = 2$。" },
                    { text: "若 $g(x) = -x^2 + 5$，求 $g(-3)$。", hint: "負負得正原則。", answers: ["$-4$"], distractors: ["$14$", "$4$", "$-1$"], 
                      analysis: "步驟一：代入 $x=-3$。\n步驟二：$g(-3) = -(-3)^2 + 5$。\n步驟三：$g(-3) = -9 + 5 = -4$。" },
                    { text: "已知函數 $f(x) = 100$，則 $f(0) + f(5) = ?$", hint: "常數函數特性。", answers: ["$200$"], distractors: ["$105$", "$100$", "$0$"], 
                      analysis: "步驟一：常數函數值恆為定值。\n步驟二：$f(0) = 100$，$f(5) = 100$。\n步驟三：$100 + 100 = 200$。" },
                    { text: "若 $f(x) = \\frac{2x+1}{x-1}$，求 $f(3)$。", hint: "分數運算。", answers: ["$3.5$"], distractors: ["$7$", "$3$", "$1.5$"], 
                      analysis: "步驟一：分子 = $2(3)+1 = 7$。\n步驟二：分母 = $3-1 = 2$。\n步驟三：$7 \\div 2 = 3.5$。" },
                    { text: "已知 $f(x) = -x + 8$，求 $f(-10)$。", hint: "注意負號。", answers: ["$18$"], distractors: ["$-2$", "$2$", "$-18$"], analysis: "步驟一：$-(-10) + 8 = 10 + 8 = 18$。" },
                    { text: "若 $g(x) = x^2 - 3x + 2$，求 $g(2)$。", hint: "代入求值。", answers: ["$0$"], distractors: ["$2$", "$1$", "$4$"], analysis: "步驟一：$2^2 - 3(2) + 2 = 4 - 6 + 2 = 0$。" },
                    { text: "若 $f(x) = \\sqrt{x+4}$，求 $f(5)$。", hint: "計算根號內部。", answers: ["$3$"], distractors: ["$9$", "$\\sqrt{5}$", "$1$"], analysis: "步驟一：$f(5) = \\sqrt{5+4} = \\sqrt{9} = 3$。" },
                    { text: "已知常數函數 $h(x) = -2.5$，求 $h(99) + h(-1)$。", hint: "兩個常數值相加。", answers: ["$-5$"], distractors: ["$-2.5$", "$0$", "$5$"], analysis: "步驟一：$(-2.5) + (-2.5) = -5$。" },
                    { text: "若 $f(x) = |2x-10|$，求 $f(3)$。", hint: "絕對值結果必為非負。", answers: ["$4$"], distractors: ["$-4$", "$0$", "$10$"], analysis: "步驟一：$2(3)-10 = -4$。步驟二：$|-4| = 4$。" },
                    { text: "若 $f(x) = (x+1)(x-1)$，求 $f(4)$。", hint: "代入計算。", answers: ["$15$"], distractors: ["$16$", "$17$", "$12$"], analysis: "步驟一：$(4+1) \\times (4-1) = 5 \\times 3 = 15$。" }
                ]
            },
            {
                id: 2, title: "單元3 函數值的應用", description: "從已知函數值反求自變數 x", targetCorrect: 5,
                problems: [
                    { text: "已知 $f(x) = 4x + 10$，若 $f(k) = 26$，求 $k = ?$", hint: "解一元一次方程式。", answers: ["$4$"], distractors: ["$5$", "$3$", "$6$"], 
                      analysis: "步驟一：列出方程式 $4k + 10 = 26$。\n步驟二：移項得 $4k = 16$。\n步驟三：解出 $k = 4$。" },
                    { text: "已知 $g(x) = c$，若 $g(3) = 10$，則 $g(-5) = ?$", hint: "常數函數特性。", answers: ["$10$"], distractors: ["$-5$", "$3$", "$-10$"], 
                      analysis: "步驟一：常數函數的結果不隨 $x$ 改變。\n步驟二：既然 $g(3)=10$，則 $g(-5)$ 亦為 10。" },
                    { text: "若 $f(x) = -2x + 7$，且 $f(a) = -3$，求 $a$。", hint: "解方程式。", answers: ["$5$"], distractors: ["$-5$", "$2$", "$4$"], 
                      analysis: "步驟一：$-2a + 7 = -3$。\n步驟二：$-2a = -10$。\n步驟三：$a = 5$。" },
                    { text: "若 $f(x) = \\frac{1}{2}x - 6$，且 $f(k) = 0$，求 $k$。", hint: "代入求 $k$。", answers: ["$12$"], distractors: ["$6$", "$3$", "$24$"], analysis: "步驟一：$1/2k = 6 \\to k = 12$。" },
                    { text: "已知 $f(x) = 3x-1$，若 $f(a) + f(2) = 14$，求 $a$。", hint: "先求 $f(2)$。", answers: ["$3.33$（或 $10/3$）"], distractors: ["$3$", "$4$", "$2$"], 
                      analysis: "步驟一：$f(2) = 3(2)-1 = 5$。\n步驟二：$f(a) + 5 = 14 \\to f(a) = 9$。\n步驟三：$3a-1 = 9 \\to 3a = 10 \\to a = 10/3$。" },
                    { text: "若 $f(x) = 5x+k$，$f(1)=8$，求 $f(2)$。", hint: "先求 $k$。", answers: ["$13$"], distractors: ["$10$", "$16$", "$15$"], analysis: "步驟一：$5(1)+k=8 \\to k=3$。步驟二：$f(2) = 5(2)+3 = 13$。" },
                    { text: "已知 $h(x) = ax+b$ 是常數函數，若 $h(5)=7$，求 $h(0)$。", hint: "定值特性。", answers: ["$7$"], distractors: ["$0$", "$5$", "$-7$"], analysis: "常數函數所有點的值都一樣。" },
                    { text: "若 $f(x) = 2x-9$，且 $f(3k) = 3$，求 $k$。", hint: "代入 $3k$。", answers: ["$2$"], distractors: ["$1$", "$6$", "$3$"], analysis: "步驟一：$2(3k)-9 = 3 \\to 6k = 12 \\to k=2$。" },
                    { text: "若 $f(x) = x+a$，已知 $f(2)=f(5)-3$，則 $a$ 可能為何？", hint: "代入觀察。", answers: ["任意數"], distractors: ["$3$", "$0$", "$1$"], analysis: "步驟一：$(2+a) = (5+a)-3 \\to 2+a = 2+a$。兩側恆等，故 $a$ 可為任意數。" },
                    { text: "已知 $f(x) = 4-x$，若 $f(k^2) = -5$，求 $k$ 的正值。", hint: "平方後等於 9。", answers: ["$3$"], distractors: ["$9$", "$2$", "$5$"], analysis: "步驟一：$4-k^2 = -5 \\to k^2 = 9 \\to k = 3$。" }
                ]
            },
            {
                id: 3, title: "單元4 函數值的應用問題", description: "解決生活情境中的函數模型問題", targetCorrect: 5,
                problems: [
                    { text: "計程車起跳價 70 元，路程 $x$ 公里收費 $y$ 元。這是否符合函數關係？", hint: "路程是否對應唯一車資。", answers: ["是"], distractors: ["不是", "不一定", "只有整數公里是"], analysis: "步驟一：思考對應關係。\n步驟二：給定確定的里程，$y$（車費）必為唯一結果。\n結論：是。" },
                    { text: "溫度計讀數 $y$ 與氣溫 $x$ 的關係為 $y = x + 1$。則 $y$ 是 $x$ 的函數嗎？", hint: "線性分析。", answers: ["是"], distractors: ["不是", "不一定", "無法確定"], analysis: "步驟一：這是一次函數模型。\n步驟二：每個 $x$ 都有唯一 $y$。\n結論：是。" },

                    <div className="w-full max-w-6xl bg-white rounded-3xl textbook-card overflow-hidden">
                        {view === 'stageSelect' ? (
                            <StageSelect stages={STAGES} completedStages={completedStages} onSelect={handleStageSelect} />
                        ) : (
                            <TutorView stage={currentStage} onComplete={() => setCompletedStages(prev => new Set(prev).add(currentStage.id))} onBack={() => setView('stageSelect')} onNextStage={handleNextStage} hasNextStage={STAGES.findIndex(s => s.id === currentStage.id) < STAGES.length - 1} />
                        )}
                    </div>
                </div>
            );
        };

        const StageSelect = ({ stages, onSelect, completedStages }) => (
            <div className="p-8 md:p-12 ui-text">
                <header className="text-center space-y-4 mb-12">
                    <div className="inline-flex items-center gap-2 px-5 py-2 bg-indigo-50 text-indigo-700 rounded-full text-xs font-black tracking-widest uppercase border border-indigo-100 shadow-sm"><Icon name="book" className="w-4 h-4" /> 2-1 函數與函數圖形 學習夥伴</div>
                    <h1 className="text-4xl font-extrabold text-slate-800 tracking-tight text-center">國中數學數位互動教材</h1>
                    <div className="h-1.5 w-24 bg-indigo-500 mx-auto rounded-full" />
                </header>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    {stages.map((s) => {
                        const done = completedStages.has(s.id);
                        return (
                            <button key={s.id} onClick={() => onSelect(s)} className={`group p-6 rounded-2xl border transition-all duration-300 text-left relative overflow-hidden flex flex-col justify-between h-44 ${done ? 'border-emerald-100 bg-emerald-50/20 shadow-sm' : 'border-slate-100 bg-white hover:border-indigo-300 hover:shadow-2xl hover:-translate-y-1'}`}>
                                <div className="space-y-2">
                                    <div className="flex justify-between items-start">
                                        <div className={`p-2 rounded-xl ${done ? 'bg-emerald-600 text-white' : 'bg-slate-50 text-slate-400 group-hover:bg-indigo-50 group-hover:text-indigo-600'}`}><Icon name="calculator" className="w-5 h-5" /></div>
                                        {done && <Icon name="check" className="w-6 h-6 text-emerald-600 animate-in zoom-in" />}
                                    </div>
                                    <div><h3 className="text-sm font-black text-slate-800 mb-1 group-hover:text-indigo-700 leading-tight">{s.title}</h3><p className="text-slate-400 text-[10px] leading-tight">{s.description}</p></div>
                                </div>
                                <div className="text-[9px] font-black uppercase text-slate-300 tracking-widest">目標：答對 {s.targetCorrect} 題</div>
                            </button>
                        );
                    })}
                </div>
            </div>
        );

        const TutorView = ({ stage, onComplete, onBack, onNextStage, hasNextStage }) => {
            const [shuffled, setShuffled] = useState([]);
            const [idx, setIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [options, setOptions] = useState([]);
            const [selected, setSelected] = useState(null);
            const [isSolved, setIsSolved] = useState(false);
            const [showHint, setShowHint] = useState(false);
            const [aiRes, setAiRes] = useState("");
            const [finished, setFinished] = useState(false);
            const [celebrated, setCelebrated] = useState(false);
            const containerRef = useRef(null);

            const curProb = shuffled[idx];

            const triggerTypeset = () => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    requestAnimationFrame(() => { window.MathJax.typesetPromise([containerRef.current]).catch(err => console.log('MathJax Err:', err)); });
                }
            };

            useEffect(() => { triggerTypeset(); }, [curProb, aiRes, showHint, isSolved, finished]);

            const init = () => {
                setShuffled(shuffleArray(stage.problems));
                setIdx(0); setScore(0); setFinished(false); setSelected(null); setIsSolved(false); setShowHint(false); setAiRes(""); setCelebrated(false);
            };

            useEffect(() => { if (stage) init(); }, [stage]);

            useEffect(() => {
                if (curProb) {
                    setSelected(null); setIsSolved(false); setShowHint(false); setAiRes("");
                    const correct = { text: curProb.answers[0], isCorrect: true };
                    const dists = curProb.distractors.map(d => ({ text: d, isCorrect: false }));
                    setOptions(shuffleArray([correct, ...dists]).slice(0, 4));
                }
            }, [curProb]);

            const handleNext = () => {
                if (idx + 1 < shuffled.length) { setIdx(idx + 1); } 
                else if (score < stage.targetCorrect) { setShuffled(shuffleArray(stage.problems)); setIdx(0); } 
                else { setFinished(true); onComplete(); }
            };

            const onOptionClick = (opt) => {
                setSelected(opt); setIsSolved(true);
                if (opt.isCorrect) {
                    const nextScore = score + 1; setScore(nextScore);
                    if (nextScore === stage.targetCorrect) setCelebrated(true);
                }
            };

            if (finished) {
                const passed = score >= stage.targetCorrect;
                return (
                    <div className="relative p-16 text-center space-y-8 overflow-hidden ui-text min-h-[600px] flex flex-col justify-center items-center">
                        {passed && <ConfettiEffect />}
                        <div className={`p-8 rounded-full inline-block animate-bounce shadow-2xl ${passed ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}><Icon name="trophy" className="w-24 h-24" /></div>
                        <h2 className="text-5xl font-black text-slate-800 tracking-tight">{passed ? "🌸 恭喜過關！ 🌸" : "尚未達標"}</h2>
                        <p className="text-slate-600 text-xl font-medium">你在本單元答對了 <span className="text-indigo-600 font-black text-4xl mx-1">{score}</span> 題 (目標：{stage.targetCorrect} 題)</p>
                        <div className="flex flex-col md:flex-row justify-center gap-4 pt-12 relative z-10">
                            <button onClick={init} className="px-10 py-5 bg-white border-2 border-slate-200 text-slate-600 font-black rounded-2xl hover:bg-slate-50 transition flex items-center justify-center gap-2 font-sans font-bold"><Icon name="refresh" className="w-5 h-5 group-hover:rotate-180 transition-transform duration-500" /> 重新練習</button>
                            {passed && hasNextStage ? (<button onClick={onNextStage} className="px-10 py-5 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-700 shadow-xl transition flex items-center justify-center gap-2 animate-pulse font-sans font-bold">挑戰下一單元 <Icon name="chevronRight" className="w-6 h-6" /></button>) : (<button onClick={onBack} className="px-10 py-5 bg-slate-900 text-white font-black rounded-2xl hover:bg-black transition font-sans font-bold">返回目錄</button>)}
                        </div>
                    </div>
                );
            }

            if (!curProb) return <div className="p-20 text-center font-black text-slate-300 ui-text uppercase tracking-widest animate-pulse">Reading unit data...</div>;

            return (
                <div className="flex flex-col min-h-[700px] bg-white" ref={containerRef}>
                    {celebrated && <ConfettiEffect />}
                    <div className="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 ui-text">
                        <button onClick={onBack} className="group flex items-center gap-2 text-slate-400 hover:text-indigo-600 transition font-bold font-sans"><Icon name="chevronLeft" className="w-5 h-5 group-hover:-translate-x-1 transition-transform" /> 返回目錄</button>
                        <div className="flex-1 flex flex-col items-center px-12 text-center">
                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{stage.title}</span>
                            <div className="flex items-center gap-3">
                                <div className="w-32 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                                    <div className="h-full bg-indigo-500 transition-all duration-500" style={{ width: `${Math.min(100, (score / stage.targetCorrect) * 100)}%` }} />
                                </div>
                                <span className={`text-xs font-bold ${score >= stage.targetCorrect ? 'text-emerald-600 animate-pulse' : 'text-slate-600'}`}>達標：{score} / {stage.targetCorrect}</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-2 text-indigo-700 font-bold text-xs px-3 py-1 bg-indigo-50 border border-indigo-100 rounded-lg font-sans"><Icon name="printer" className="w-4 h-4" /> 數位印刷</div>
                    </div>

                    <div className="flex-1 p-8 md:p-12 space-y-12">
                        <div className="space-y-6">
                            <div className="flex items-center gap-4 ui-text"><span className="bg-slate-800 text-white text-[10px] font-black px-2 py-1 rounded tracking-widest uppercase font-sans font-bold">題目 {idx + 1}</span><div className="h-px flex-1 bg-slate-100" /></div>
                            <h2 className="text-4xl font-bold text-slate-900 leading-relaxed math-text pl-4 border-l-4 border-indigo-500 bg-slate-50/50 py-3 rounded-r-xl">{curProb.text}</h2>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {options.map((opt, i) => (
                                <button key={i} disabled={isSolved} onClick={() => onOptionClick(opt)}
                                    className={`group p-6 text-2xl border-2 rounded-2xl text-left transition-all flex items-center justify-between font-sans font-bold ${
                                        isSolved ? opt.isCorrect ? 'border-emerald-500 bg-emerald-50 text-emerald-900 shadow-sm ring-4 ring-emerald-50' : selected?.text === opt.text ? 'border-rose-400 bg-rose-50 text-rose-700 ring-4 ring-rose-50' : 'border-slate-50 text-slate-300 opacity-50' : 'border-slate-100 bg-white hover:border-indigo-300 hover:shadow-xl hover:-translate-y-0.5'
                                    }`}
                                >
                                    <span className="math-text">{opt.text}</span>
                                    <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all ${isSolved && opt.isCorrect ? 'bg-emerald-500 border-emerald-500 scale-110 shadow-lg' : 'border-slate-200'}`}>{isSolved && opt.isCorrect && <Icon name="check" className="w-5 h-5 text-white" />}</div>
                                </button>
                            ))}
                        </div>

                        <div className="pt-8 border-t border-slate-100 space-y-8 ui-text">
                            <div className="flex flex-wrap gap-4">
                                <button onClick={() => setShowHint(!showHint)} className={`flex items-center gap-2 px-6 py-3 text-sm font-black rounded-xl transition border-2 font-sans font-bold ${showHint ? 'bg-amber-500 border-amber-500 text-white shadow-lg' : 'bg-white border-amber-200 text-amber-700 hover:bg-amber-50'}`}><Icon name="lightbulb" className="w-4 h-4" /> 解題小提點</button>
                                <button onClick={() => setAiRes(curProb.analysis)} disabled={!isSolved} className={`flex items-center gap-2 px-6 py-3 text-sm font-black text-white rounded-xl transition shadow-xl active:scale-95 font-sans font-bold ${isSolved ? 'bg-slate-900 hover:bg-indigo-900 shadow-indigo-100' : 'bg-slate-200 cursor-not-allowed opacity-50'}`}><Icon name="sparkles" className="w-4 h-4" /> AI 詳細解析</button>
                                {!isSolved && <span className="text-xs text-slate-400 self-center font-bold tracking-tight font-sans italic">💡 請先作答以觀看解題步驟</span>}
                            </div>
                            {showHint && (<div className="p-8 bg-amber-50/60 rounded-2xl border-l-[8px] border-amber-400 animate-in slide-in-from-left-2 duration-300 shadow-sm"><div className="flex items-center gap-2 text-amber-800 font-black mb-3 text-xs uppercase tracking-widest font-sans font-bold"><Icon name="alert" className="w-5 h-5" /> 老師提示</div><p className="text-amber-900 leading-relaxed font-bold text-xl math-text">{curProb.hint}</p></div>)}
                            {aiRes && (
                                <div className="p-10 bg-[#0f172a] rounded-3xl text-slate-300 space-y-6 shadow-2xl border border-slate-800 animate-in zoom-in-95">
                                    <div className="flex items-center justify-between border-b border-slate-800 pb-5">
                                        <div className="flex items-center gap-3 text-indigo-400 font-black text-xs tracking-widest uppercase font-sans font-bold"><Icon name="sparkles" className="w-4 h-4" /> 精細解析 (Step-by-Step)</div>
                                    </div>
                                    <div className="text-xl leading-[2.2] whitespace-pre-wrap math-text text-slate-100 font-medium">{aiRes}</div>
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="p-10 bg-slate-50/50 border-t border-slate-100 flex flex-wrap justify-end items-center gap-6 ui-text">
                        {isSolved && (
                            <div className="flex gap-4">
                                {score >= stage.targetCorrect && hasNextStage && (
                                    <button onClick={onNextStage} className="group flex items-center gap-4 px-14 py-6 bg-emerald-600 text-white font-black rounded-2xl hover:bg-emerald-700 shadow-2xl shadow-emerald-200 transition-all hover:-translate-y-1 active:scale-95 font-sans font-bold animate-in slide-in-from-right-4"><Icon name="party" className="w-7 h-7" /><span className="text-xl tracking-tight">挑戰下一單元</span><Icon name="chevronRight" className="w-7 h-7 group-hover:translate-x-1.5 transition-transform" /></button>
                                )}
                                <button onClick={handleNext} className="group flex items-center gap-4 px-14 py-6 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-700 shadow-2xl shadow-indigo-200 transition-all hover:-translate-y-1 active:scale-95 font-sans font-bold"><span className="text-xl tracking-tight">繼續下一題</span><Icon name="chevronRight" className="w-7 h-7 group-hover:translate-x-1.5 transition-transform" /></button>
                            </div>
                        )}
                        {!isSolved && (<div className="text-slate-300 text-sm font-bold italic tracking-widest uppercase font-sans font-bold">Awaiting student response...</div>)}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
