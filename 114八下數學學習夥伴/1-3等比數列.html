<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-3 等比數列 學習夥伴</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- MathJax for LaTeX Rendering -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$']]
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .math-text { font-family: 'Noto Serif TC', serif; }
        .textbook-card { box-shadow: 0 15px 45px -10px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        mjx-container { outline: none !important; font-size: 1.15em !important; }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .animate-fall { position: absolute; animation-name: fall; animation-timing-function: linear; animation-iteration-count: infinite; }
        .ui-text { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- 核心輔助函數 ---
        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        // --- 圖標組件 ---
        const Icon = ({ name, className }) => {
            const icons = {
                chevronLeft: <path d="m15 18-6-6 6-6"/>,
                chevronRight: <path d="m9 18 6-6-6-6"/>,
                lightbulb: (
                    <>
                        <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/>
                        <path d="M9 18h6"/>
                        <path d="M10 22h4"/>
                    </>
                ),
                sparkles: (
                    <>
                        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1-1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                        <path d="M5 3v4"/>
                        <path d="M19 17v4"/>
                        <path d="M3 5h4"/>
                        <path d="M17 19h4"/>
                    </>
                ),
                check: (
                    <>
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </>
                ),
                calculator: (
                    <>
                        <rect width="16" height="20" x="4" y="2" rx="2"/>
                        <line x1="8" x2="16" y1="6" y2="6"/>
                        <line x1="16" x2="16" y1="14" y2="18"/>
                        <path d="M16 10h.01"/>
                        <path d="M12 10h.01"/>
                        <path d="M8 10h.01"/>
                        <path d="M12 14h.01"/>
                        <path d="M8 14h.01"/>
                        <path d="M12 18h.01"/>
                        <path d="M8 18h.01"/>
                    </>
                ),
                trophy: (
                    <>
                        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
                        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
                        <path d="M4 22h16"/>
                        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
                        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
                        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
                    </>
                ),
                refresh: (
                    <>
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
                        <path d="M16 16h5v5"/>
                    </>
                ),
                book: (
                    <>
                        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/>
                        <path d="M8 6h10"/>
                        <path d="M8 10h10"/>
                        <path d="M8 14h10"/>
                    </>
                ),
                alert: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" x2="12" y1="8" y2="12"/>
                        <line x1="12" x2="12.01" y1="16" y2="16"/>
                    </>
                ),
                party: (
                    <>
                        <path d="M20 21a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2"/>
                        <path d="M2 7h20"/>
                        <path d="M5 11v8"/>
                        <path d="M9 11v8"/>
                        <path d="M13 11v8"/>
                        <path d="M17 11v8"/>
                    </>
                ),
                printer: (
                    <>
                        <polyline points="6 9 6 2 18 2 18 9" />
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
                        <rect x="6" y="14" width="12" height="8" />
                    </>
                )
            };
            return (
                <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {icons[name]}
                </svg>
            );
        };

        const ConfettiEffect = () => {
            const pieces = useMemo(() => Array.from({ length: 60 }).map((_, i) => ({
                id: i, left: Math.random() * 100, delay: Math.random() * 2, duration: 3 + Math.random() * 2,
                size: 15 + Math.random() * 25, emoji: ['🌸', '✨', '🎉', '🎊', '⭐', '🎈'][Math.floor(Math.random() * 6)]
            })), []);
            return (
                <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
                    {pieces.map(p => (
                        <div key={p.id} className="animate-fall" style={{ left: `${p.left}%`, top: `-50px`, animationDelay: `${p.delay}s`, animationDuration: `${p.duration}s`, fontSize: `${p.size}px` }}>
                            {p.emoji}
                        </div>
                    ))}
                </div>
            );
        };

        // --- 1-3 等比數列 完整題庫 ---
        const STAGES = [
            {
                id: 0, title: "單元1 等比數列的判別", description: "判斷數列是否具備固定的公比 (Common Ratio)", targetCorrect: 5,
                problems: [
                    { text: "判斷數列 $2, 4, 8, 16$ 是否為等比數列？", hint: "檢查相鄰兩項的商是否相等。", answers: ["是"], distractors: ["不是", "是，公比為 $0$", "是，公比為 $1$"], 
                      analysis: "步驟一：檢查相鄰兩項之比：$4 \\div 2 = 2$，$8 \\div 4 = 2$，$16 \\div 8 = 2$。\n步驟二：商值（公比）固定為 $2$。\n步驟三：符合等比數列定義。\n最終結論：是。" },
                    { text: "判斷數列 $1, 3, 6, 12$ 是否為等比數列？", hint: "檢查 $3/1$ 與 $6/3$ 是否一致。", answers: ["不是"], distractors: ["是", "是，公比為 $3$", "是，公比為 $2$"], 
                      analysis: "步驟一：計算第一、二項之比：$3 \\div 1 = 3$。\n步驟二：計算第二、三項之比：$6 \\div 3 = 2$。\n步驟三：比值不相等（$3 \\neq 2$），故公比不固定。\n最終結論：不是。" },
                    { text: "判斷數列 $5, -5, 5, -5$ 是否為等比數列？", hint: "公比可以是負數。", answers: ["是，公比為 $-1$"], distractors: ["不是", "是，公比為 $1$", "是，公比為 $0$"], 
                      analysis: "步驟一：計算相鄰項之比：$-5 \\div 5 = -1$，$5 \\div -5 = -1$。\n步驟二：公比固定為 $-1$。\n步驟三：各項比值恆定，符合定義。\n最終結論：是。" },
                    { text: "判斷數列 $10, 5, 2.5, 1.25$ 是否為等比數列？", hint: "比值為 0.5。", answers: ["是"], distractors: ["不是", "是，公比 $2$", "是，公比 $5$"], 
                      analysis: "步驟一：計算商值：$5 \\div 10 = 0.5$，$2.5 \\div 5 = 0.5$。\n步驟二：比值恆為 $0.5$。\n最終結論：是。" },
                    { text: "判斷數列 $1, -2, 4, -8$ 是否為等比數列？", hint: "計算 $a_2 / a_1$。", answers: ["是"], distractors: ["不是", "是，公比 $2$", "是，公比 $1$"], 
                      analysis: "步驟一：計算比值：$-2 \\div 1 = -2$，$4 \\div -2 = -2$。\n步驟二：公比固定為 $-2$。\n最終結論：是。" }
                ]
            },
            {
                id: 1, title: "單元2 列出等比數列", description: "根據首項與公比寫出數列各項", targetCorrect: 5,
                problems: [
                    { text: "已知等比數列首項 $a_1 = 3$，公比 $r = 2$，求前三項。", hint: "每次乘以 2。", answers: ["$3, 6, 12$"], distractors: ["$3, 5, 7$", "$3, 9, 27$", "$2, 6, 18$"], 
                      analysis: "步驟一：第一項為首項 $a_1 = 3$。\n步驟二：第二項 $a_2 = a_1 \\times r = 3 \\times 2 = 6$。\n步驟三：第三項 $a_3 = a_2 \\times r = 6 \\times 2 = 12$。\n最終答案：$3, 6, 12$。" },
                    { text: "已知首項為 $100$，公比為 $0.1$，求前三項。", hint: "每次乘以 0.1。", answers: ["$100, 10, 1$"], distractors: ["$100, 10, 0.1$", "$100, 90, 80$", "$100, 110, 121$"], 
                      analysis: "步驟一：$a_1 = 100$。\n步驟二：$a_2 = 100 \\times 0.1 = 10$。\n步驟三：$a_3 = 10 \\times 0.1 = 1$。\n最終答案：$100, 10, 1$。" },
                    { text: "首項 $a_1=-2$，公比 $r=-3$，求前三項。", hint: "注意負負得正。", answers: ["$-2, 6, -18$"], distractors: ["$-2, -6, -18$", "$-2, 1, 4$", "$2, 6, 18$"], 
                      analysis: "步驟一：$a_1 = -2$。\n步驟二：$a_2 = (-2) \\times (-3) = 6$。\n步驟三：$a_3 = 6 \\times (-3) = -18$。\n最終答案：$-2, 6, -18$。" }
                ]
            },
            {
                id: 2, title: "單元3 等比數列求值", description: "求出特定項的值或項數", targetCorrect: 5,
                problems: [
                    { text: "若等比數列首項為 $5$，公比為 $2$，求第 $6$ 項 $a_6$。", hint: "$a_n = a_1 \\times r^{n-1}$。", answers: ["$160$"], distractors: ["$80$", "$320$", "$64$"], 
                      analysis: "步驟一：帶入公式 $a_6 = a_1 \\times r^{5}$。\n步驟二：$a_6 = 5 \\times 2^5 = 5 \\times 32$。\n步驟三：計算結果為 $160$。\n最終答案：160。" },
                    { text: "已知等比數列 $3, 9, 27, \\dots$，求第 $5$ 項。", hint: "先找出公比 $r$。", answers: ["$243$"], distractors: ["$81$", "$729$", "$135$"], 
                      analysis: "步驟一：計算公比 $r = 9 \\div 3 = 3$。\n步驟二：求 $a_5 = a_1 \\times r^4$。\n步驟三：$a_5 = 3 \\times 3^4 = 3 \\times 81 = 243$。\n最終答案：243。" },
                    { text: "一等比數列第 $2$ 項為 $6$，第 $3$ 項為 $18$，求首項 $a_1$。", hint: "先求 $r = a_3 / a_2$。", answers: ["$2$"], distractors: ["$3$", "$1$", "$6$"], 
                      analysis: "步驟一：計算公比 $r = 18 \\div 6 = 3$。\n步驟二：由 $a_2 = a_1 \\times r$ 得 $6 = a_1 \\times 3$。\n步驟三：解出 $a_1 = 2$。\n最終答案：2。" }
                ]
            },
            {
                id: 3, title: "單元4 等比數列的應用問題", description: "解決生活中的倍數增長問題", targetCorrect: 5,
                problems: [
                    { text: "某種細菌每小時分裂一次（數量變 2 倍）。若初始有 10 隻，4 小時後有幾隻？", hint: "4 小時後代表第 5 項。", answers: ["$160$ 隻"], distractors: ["$80$ 隻", "$40$ 隻", "$320$ 隻"], 
                      analysis: "步驟一：初始值 $a_1 = 10$，公比 $r = 2$。\n步驟二：經過 4 小時代表求數列的第 5 項 ($a_5$)。\n步驟三：$a_5 = 10 \\times 2^4 = 10 \\times 16 = 160$。\n最終答案：160 隻。" },
                    { text: "商品價格每年上漲 10% (變 1.1 倍)。若今年 100 元，兩年後是多少元？", hint: "$a_3 = 100 \\times 1.1^2$。", answers: ["$121$ 元"], distractors: ["$120$ 元", "$110$ 元", "$133$ 元"], 
                      analysis: "步驟一：今年 ($a_1$) 為 $100$。\n步驟二：第一年後 ($a_2$) 為 $100 \\times 1.1 = 110$。\n步驟三：第二年後 ($a_3$) 為 $110 \\times 1.1 = 121$。\n最終答案：121 元。" },
                    { text: "排三角形：用 67 根吸管剛好可排圖幾？", hint: "這是等差應用題：$67 = 3 + (n-1)2$。", answers: ["$33$"], distractors: ["$32$", "$34$", "$35$"], 
                      analysis: "步驟一：列出公式 $67 = 3 + (n-1) \\times 2$。\n步驟二：$64 = 2(n-1) \\to 32 = n-1$。\n步驟三：解出 $n = 33$。\n最終答案：33。" }
                ]
            },
            {
                id: 4, title: "單元5 等比中項求值", description: "求兩數之間的等比中項 (Geometric Mean)", targetCorrect: 5,
                problems: [
                    { text: "已知 $4, x, 9$ 成等比數列，求 $x$ 之值。", hint: "$x^2 = 4 \\times 9$。", answers: ["$6$ 或 $-6$"], distractors: ["$6$", "$13$", "$36$"], 
                      analysis: "步驟一：根據等比中項公式，中項的平方等於兩旁之積：$x^2 = 4 \\times 9$。\n步驟二：$x^2 = 36$。\n步驟三：求平方根得 $x = \\pm 6$。\n最終答案：6 或 -6。" },
                    { text: "已知 $2$ 與 $8$ 的等比中項為 $p$，求 $p$。", hint: "中項平方等於兩旁積。", answers: ["$\\pm 4$"], distractors: ["$4$", "$5$", "$16$"], 
                      analysis: "步驟一：$p^2 = 2 \\times 8 = 16$。\n步驟二：$p = \\sqrt{16}$ 或 $-\\sqrt{16}$。\n步驟三：$p = 4$ 或 $-4$。\n最終答案：$\\pm 4$。" },
                    { text: "已知 $1$ 與 $25$ 的等比中項。", hint: "$x^2=25$。", answers: ["$\\pm 5$"], distractors: ["$5$", "$12.5$", "$0$"], analysis: "步驟一：$x^2 = 1 \\times 25$。步驟二：$x = \\pm 5$。" }
                ]
            },
            {
                id: 5, title: "單元6 等比中項的應用", description: "利用等比性質解決複合問題", targetCorrect: 5,
                problems: [
                    { text: "若 $x-2, x, x+3$ 成等比數列，求 $x$。", hint: "$x^2 = (x-2)(x+3)$。", answers: ["$6$"], distractors: ["$5$", "$4$", "$3$"], 
                      analysis: "步驟一：列出方程式 $x^2 = (x-2)(x+3)$。\n步驟二：展開右側得 $x^2 = x^2 + x - 6$。\n步驟三：消去兩側 $x^2$ 得 $0 = x - 6$。\n步驟四：解出 $x = 6$。\n最終答案：6。" },
                    { text: "若 $1, x, x+2$ 成等比且 $x>0$，求 $x$。", hint: "$x^2 = x+2$。", answers: ["$2$"], distractors: ["$1$", "$3$", "$-1$"], 
                      analysis: "步驟一：列式 $x^2 = 1 \\times (x+2) \\to x^2 - x - 2 = 0$。\n步驟二：因式分解得 $(x-2)(x+1) = 0$。\n步驟三：解出 $x = 2$ 或 $-1$。\n步驟四：根據條件 $x>0$，取 $x=2$。\n最終答案：2。" },
                    { text: "若 $x, x+3, x+9$ 成等比數列，求 $x$。", hint: "$(x+3)^2 = x(x+9)$。", answers: ["$3$"], distractors: ["$9$", "$6$", "$0$"], 
                      analysis: "步驟一：列式 $(x+3)^2 = x(x+9)$。\n步驟二：展開得 $x^2 + 6x + 9 = x^2 + 9x$。\n步驟三：整理得 $9 = 3x$。\n步驟四：解出 $x = 3$。\n最終答案：3。" },
                    { text: "若 $a, 6, 12$ 成等比，求 $a$。", hint: "$6^2 = 12a$。", answers: ["$3$"], distractors: ["$2$", "$1$", "$4$"], analysis: "步驟一：$36 = 12a$。步驟二：$a = 3$。" },
                    { text: "若 $3, 6, x$ 成等比，求 $x$。", hint: "$6^2 = 3x$。", answers: ["$12$"], distractors: ["$9$", "$15$", "$18$"], analysis: "步驟一：$36 = 3x$。步驟二：$x = 12$。" },
                    { text: "若 $x+1, x+3, x+7$ 成等比，求 $x$。", hint: "$(x+3)^2 = (x+1)(x+7)$。", answers: ["$1$"], distractors: ["$2$", "$0$", "$5$"], analysis: "步驟一：$x^2+6x+9 = x^2+8x+7$。步驟二：$2x=2 \\to x=1$。" },
                    { text: "若 $x-1, x, x+2$ 成等比，求 $x$。", hint: "$x^2 = (x-1)(x+2)$。", answers: ["$2$"], distractors: ["$1$", "$3$", "$4$"], analysis: "步驟一：$x^2 = x^2+x-2$。步驟二：$x=2$。" },
                    { text: "若 $2, x, 18$ 成等比且 $x<0$，求 $x$。", hint: "選負值。", answers: ["$-6$"], distractors: ["$6$", "$-9$", "$-12$"], analysis: "步驟一：$x^2=36$。步驟二：$x=\\pm 6$。取負。" },
                    { text: "若 $x, 10, 20$ 成等比，求 $x$。", hint: "$100 = 20x$。", answers: ["$5$"], distractors: ["$10$", "$2$", "$25$"], analysis: "步驟一：$100=20x$。步驟二：$x=5$。" },
                    { text: "若 $x+2, 4, x-2$ 成等比，求 $x$ 的正值。", hint: "$x^2-4=16$。", answers: ["$\\sqrt{20}$"], distractors: ["$4$", "$6$", "$2$"], analysis: "步驟一：$x^2-4=16 \\to x^2=20$。步驟二：$x=\\sqrt{20}$。" }
                ]
            }
        ];

        // --- 主程式組件 ---
        const App = () => {
            const [view, setView] = useState('stageSelect');
            const [completedStages, setCompletedStages] = useState(new Set());
            const [currentStage, setCurrentStage] = useState(null);

            const handleStageSelect = (stage) => { setCurrentStage(stage); setView('tutor'); };
            const handleNextStage = () => {
                const curIdx = STAGES.findIndex(s => s.id === currentStage.id);
                if (curIdx < STAGES.length - 1) handleStageSelect(STAGES[curIdx + 1]);
                else setView('stageSelect');
            };

            return (
                <div className="min-h-screen bg-[#f8fafc] p-4 md:p-8 flex items-center justify-center">
                    <div className="w-full max-w-4xl bg-white rounded-3xl textbook-card overflow-hidden">
                        {view === 'stageSelect' ? (
                            <StageSelect stages={STAGES} completedStages={completedStages} onSelect={handleStageSelect} />
                        ) : (
                            <TutorView stage={currentStage} onComplete={() => setCompletedStages(prev => new Set(prev).add(currentStage.id))} onBack={() => setView('stageSelect')} onNextStage={handleNextStage} hasNextStage={STAGES.findIndex(s => s.id === currentStage.id) < STAGES.length - 1} />
                        )}
                    </div>
                </div>
            );
        };

        const StageSelect = ({ stages, onSelect, completedStages }) => (
            <div className="p-10 space-y-12 ui-text">
                <header className="text-center space-y-4">
                    <div className="inline-flex items-center gap-2 px-4 py-1.5 bg-indigo-50 text-indigo-700 rounded-full text-xs font-black tracking-widest uppercase border border-indigo-100 shadow-sm"><Icon name="book" className="w-4 h-4" /> 1-3 等比數列 學習夥伴</div>
                    <h1 className="text-4xl font-extrabold text-slate-800 tracking-tight text-center">國中數學數位教材</h1>
                    <div className="h-1 w-24 bg-indigo-500 mx-auto rounded-full" />
                </header>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {stages.map((s) => {
                        const done = completedStages.has(s.id);
                        return (
                            <button key={s.id} onClick={() => onSelect(s)} className={`group p-6 rounded-2xl border transition-all duration-300 text-left relative overflow-hidden flex flex-col justify-between h-52 ${done ? 'border-emerald-100 bg-emerald-50/20 shadow-sm' : 'border-slate-100 bg-white hover:border-indigo-300 hover:shadow-2xl hover:-translate-y-1'}`}>
                                <div className="space-y-3">
                                    <div className="flex justify-between items-start">
                                        <div className={`p-2 rounded-xl ${done ? 'bg-emerald-600 text-white' : 'bg-slate-50 text-slate-400 group-hover:bg-indigo-50'}`}><Icon name="calculator" className="w-5 h-5" /></div>
                                        {done && <Icon name="check" className="w-6 h-6 text-emerald-600" />}
                                    </div>
                                    <div><h3 className="text-lg font-black text-slate-800 mb-1 group-hover:text-indigo-700">{s.title}</h3><p className="text-slate-500 text-xs">{s.description}</p></div>
                                </div>
                                <div className="text-[10px] font-black uppercase text-slate-300 tracking-widest">目標：答對 {s.targetCorrect} 題</div>
                            </button>
                        );
                    })}
                </div>
            </div>
        );

        const TutorView = ({ stage, onComplete, onBack, onNextStage, hasNextStage }) => {
            const [shuffled, setShuffled] = useState([]);
            const [idx, setIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [options, setOptions] = useState([]);
            const [selected, setSelected] = useState(null);
            const [isSolved, setIsSolved] = useState(false);
            const [showHint, setShowHint] = useState(false);
            const [aiRes, setAiRes] = useState("");
            const [finished, setFinished] = useState(false);
            const [celebrated, setCelebrated] = useState(false);
            const containerRef = useRef(null);

            const curProb = shuffled[idx];

            const triggerTypeset = () => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    requestAnimationFrame(() => { window.MathJax.typesetPromise([containerRef.current]).catch(err => console.log(err)); });
                }
            };

            useEffect(() => { triggerTypeset(); }, [curProb, aiRes, showHint, isSolved, finished]);

            const init = () => {
                setShuffled(shuffleArray(stage.problems));
                setIdx(0); setScore(0); setFinished(false); setSelected(null); setIsSolved(false); setShowHint(false); setAiRes(""); setCelebrated(false);
            };

            useEffect(() => { if (stage) init(); }, [stage]);

            useEffect(() => {
                if (curProb) {
                    setSelected(null); setIsSolved(false); setShowHint(false); setAiRes("");
                    const correct = { text: curProb.answers[0], isCorrect: true };
                    const dists = curProb.distractors.map(d => ({ text: d, isCorrect: false }));
                    setOptions(shuffleArray([correct, ...dists]).slice(0, 4));
                }
            }, [curProb]);

            const handleNext = () => {
                if (idx + 1 < shuffled.length) { setIdx(idx + 1); } 
                else if (score < stage.targetCorrect) { setShuffled(shuffleArray(stage.problems)); setIdx(0); } 
                else { setFinished(true); onComplete(); }
            };

            const onOptionClick = (opt) => {
                setSelected(opt); setIsSolved(true);
                if (opt.isCorrect) {
                    const nextScore = score + 1; setScore(nextScore);
                    if (nextScore === stage.targetCorrect) setCelebrated(true);
                }
            };

            if (finished) {
                const passed = score >= stage.targetCorrect;
                return (
                    <div className="relative p-16 text-center space-y-8 overflow-hidden ui-text">
                        {passed && <ConfettiEffect />}
                        <div className={`p-8 rounded-full inline-block animate-bounce shadow-2xl ${passed ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}><Icon name="trophy" className="w-24 h-24" /></div>
                        <h2 className="text-5xl font-black text-slate-800 tracking-tight">{passed ? "🌸 恭喜過關！ 🌸" : "尚未達標"}</h2>
                        <p className="text-slate-600 text-xl font-medium">你在本單元答對了 <span className="text-indigo-600 font-black text-4xl mx-1">{score}</span> 題 (目標：{stage.targetCorrect} 題)</p>
                        <div className="flex flex-col md:flex-row justify-center gap-4 pt-12 relative z-10">
                            <button onClick={init} className="px-10 py-5 bg-white border-2 border-slate-200 text-slate-600 font-black rounded-2xl hover:bg-slate-50 transition flex items-center justify-center gap-2 group"><Icon name="refresh" className="w-5 h-5 group-hover:rotate-180 transition-transform duration-500" /> 重新練習</button>
                            {passed && hasNextStage ? (<button onClick={onNextStage} className="px-10 py-5 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-700 shadow-xl transition flex items-center justify-center gap-2 animate-pulse font-sans">挑戰下一關 <Icon name="chevronRight" className="w-6 h-6" /></button>) : (<button onClick={onBack} className="px-10 py-5 bg-slate-900 text-white font-black rounded-2xl hover:bg-black transition font-sans">返回目錄</button>)}
                        </div>
                    </div>
                );
            }

            if (!curProb) return <div className="p-20 text-center font-black text-slate-300">卷宗讀取中...</div>;

            return (
                <div className="flex flex-col min-h-[700px] bg-white" ref={containerRef}>
                    {celebrated && <ConfettiEffect />}
                    <div className="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 ui-text">
                        <button onClick={onBack} className="group flex items-center gap-2 text-slate-400 hover:text-indigo-600 transition font-bold font-sans"><Icon name="chevronLeft" className="w-5 h-5 group-hover:-translate-x-1 transition-transform" /> 返回目錄</button>
                        <div className="flex-1 flex flex-col items-center px-12 text-center">
                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{stage.title}</span>
                            <div className="flex items-center gap-3">
                                <div className="w-32 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                                    <div className="h-full bg-indigo-500 transition-all duration-500" style={{ width: `${Math.min(100, (score / stage.targetCorrect) * 100)}%` }} />
                                </div>
                                <span className={`text-xs font-bold ${score >= stage.targetCorrect ? 'text-emerald-600 animate-pulse' : 'text-slate-600'}`}>已達標：{score} / {stage.targetCorrect}</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-2 text-indigo-700 font-bold text-xs px-3 py-1 bg-indigo-50 border border-indigo-100 rounded-lg font-sans"><Icon name="printer" className="w-4 h-4" /> 數位印刷</div>
                    </div>

                    <div className="flex-1 p-10 md:p-14 space-y-12">
                        <div className="space-y-8">
                            <div className="flex items-center gap-4"><span className="bg-slate-800 text-white text-[10px] font-black px-2 py-1 rounded tracking-widest uppercase font-sans">題目 {idx + 1}</span><div className="h-px flex-1 bg-slate-100" /></div>
                            <h2 className="text-4xl font-bold text-slate-900 leading-relaxed math-text pl-4 border-l-4 border-indigo-500 bg-slate-50/50 py-3 rounded-r-xl">{curProb.text}</h2>
                            {curProb.patternType && (<div className="flex justify-center gap-6 py-4"><GeometricPattern type={curProb.patternType} count={1} /><GeometricPattern type={curProb.patternType} count={2} /><GeometricPattern type={curProb.patternType} count={3} /></div>)}
                            {curProb.patternDescription && (
                                <div className="p-5 bg-indigo-50 border border-indigo-100 rounded-2xl flex items-start gap-4 shadow-sm">
                                    <div className="p-3 bg-indigo-600 rounded-xl text-white shadow-lg"><Icon name="book" className="w-6 h-6" /></div>
                                    <div className="space-y-1"><span className="text-xs font-black uppercase tracking-widest text-indigo-400">圖案規律說明</span><p className="text-indigo-900 text-lg font-medium leading-relaxed">{curProb.patternDescription}</p></div>
                                </div>
                            )}
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {options.map((opt, i) => (
                                <button key={i} disabled={isSolved} onClick={() => onOptionClick(opt)}
                                    className={`group p-8 text-2xl border-2 rounded-2xl text-left transition-all flex items-center justify-between font-sans ${
                                        isSolved ? opt.isCorrect ? 'border-emerald-500 bg-emerald-50 text-emerald-900 shadow-sm ring-4 ring-emerald-50' : selected?.text === opt.text ? 'border-rose-400 bg-rose-50 text-rose-700 ring-4 ring-rose-50' : 'border-slate-50 text-slate-300 opacity-50' : 'border-slate-100 bg-white hover:border-indigo-300 hover:shadow-xl hover:-translate-y-0.5'
                                    }`}
                                >
                                    <span className="math-text">{opt.text}</span>
                                    <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all ${isSolved && opt.isCorrect ? 'bg-emerald-500 border-emerald-500 scale-110 shadow-lg' : 'border-slate-200'}`}>{isSolved && opt.isCorrect && <Icon name="check" className="w-5 h-5 text-white" />}</div>
                                </button>
                            ))}
                        </div>

                        <div className="pt-10 border-t border-slate-100 space-y-8 ui-text">
                            <div className="flex flex-wrap gap-4">
                                <button onClick={() => setShowHint(!showHint)} className={`flex items-center gap-2 px-6 py-3 text-sm font-black rounded-xl transition border-2 font-sans ${showHint ? 'bg-amber-500 border-amber-500 text-white shadow-lg' : 'bg-white border-amber-200 text-amber-700 hover:bg-amber-50'}`}><Icon name="lightbulb" className="w-4 h-4" /> 解題小提點</button>
                                <button onClick={() => setAiRes(curProb.analysis)} disabled={!isSolved} className={`flex items-center gap-2 px-6 py-3 text-sm font-black text-white rounded-xl transition shadow-xl active:scale-95 font-sans ${isSolved ? 'bg-slate-900 hover:bg-indigo-900 shadow-indigo-100' : 'bg-slate-200 cursor-not-allowed opacity-50'}`}><Icon name="sparkles" className="w-4 h-4" /> AI 詳細解析</button>
                                {!isSolved && <span className="text-xs text-slate-400 self-center font-bold tracking-tight font-sans italic">💡 請先作答以觀看解題步驟</span>}
                            </div>
                            {showHint && (<div className="p-8 bg-amber-50/60 rounded-2xl border-l-[8px] border-amber-400 animate-in slide-in-from-left-2 duration-300 shadow-sm"><div className="flex items-center gap-2 text-amber-800 font-black mb-3 text-xs uppercase tracking-widest font-sans"><Icon name="alert" className="w-5 h-5" /> 老師提示</div><p className="text-amber-900 leading-relaxed font-bold text-xl math-text">{curProb.hint}</p></div>)}
                            {aiRes && (
                                <div className="p-10 bg-[#0f172a] rounded-3xl text-slate-300 space-y-6 shadow-2xl border border-slate-800 animate-in zoom-in-95">
                                    <div className="flex items-center justify-between border-b border-slate-800 pb-5">
                                        <div className="flex items-center gap-3 text-indigo-400 font-black text-xs tracking-widest uppercase font-sans"><Icon name="sparkles" className="w-4 h-4" /> 精細解析 (Step-by-Step)</div>
                                    </div>
                                    <div className="text-xl leading-[2.2] whitespace-pre-wrap math-text text-slate-100 font-medium">{aiRes}</div>
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="p-10 bg-slate-50/50 border-t border-slate-100 flex flex-wrap justify-end items-center gap-6 ui-text">
                        {isSolved && (
                            <div className="flex gap-4">
                                {score >= stage.targetCorrect && hasNextStage && (
                                    <button onClick={onNextStage} className="group flex items-center gap-4 px-14 py-6 bg-emerald-600 text-white font-black rounded-2xl hover:bg-emerald-700 shadow-2xl shadow-emerald-200 transition-all hover:-translate-y-1 active:scale-95 font-sans animate-in slide-in-from-right-4"><Icon name="party" className="w-7 h-7" /><span className="text-xl tracking-tight">挑戰下一關</span><Icon name="chevronRight" className="w-7 h-7 group-hover:translate-x-1.5 transition-transform" /></button>
                                )}
                                <button onClick={handleNext} className="group flex items-center gap-4 px-14 py-6 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-700 shadow-2xl shadow-indigo-200 transition-all hover:-translate-y-1 active:scale-95 font-sans"><span className="text-xl tracking-tight">繼續下一題</span><Icon name="chevronRight" className="w-7 h-7 group-hover:translate-x-1.5 transition-transform" /></button>
                            </div>
                        )}
                        {!isSolved && (<div className="text-slate-300 text-sm font-bold italic tracking-widest uppercase font-sans">Awaiting student response...</div>)}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
